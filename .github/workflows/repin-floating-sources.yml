name: Re-pin Floating Sources

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Space-separated package names (empty = all floating packages)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  repin:
    name: Re-pin floating branch sources
    runs-on: ubuntu-latest
    if: github.repository == 'djunekz/termux-app-store'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14"

      - name: Run re-pin tool
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python ci/repin_floating_sources.py --apply ${{ github.event.inputs.packages }}

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet -- packages/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed packages:"
            git diff --name-only -- packages/
          fi

      - name: Create branch and push
        if: steps.check.outputs.changed == 'true'
        id: push
        run: |
          BRANCH="repin/floating-sources-$(date +%s)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          git config user.name "Termux App Store"
          git config user.email "258516621+termux-app-store@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git"

          git checkout -b "$BRANCH"
          git add packages/
          git commit -m "fix(srcurl): re-pin floating branch sources to tag/commit SHA"
          git push -u origin "$BRANCH"

      - name: Open PR for review
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr create \
            --title "fix(srcurl): re-pin floating branch sources" \
            --base master \
            --head "${{ steps.push.outputs.branch }}" \
            --body "$(cat <<'EOF'
          Automated re-pin of packages that were still pinned to a floating
          branch tarball (`archive/refs/heads/...`) instead of an immutable
          tag or commit SHA, generated by `ci/repin_floating_sources.py`.

          Each package's `TERMUX_PKG_VERSION`, `TERMUX_PKG_SRCURL`, and
          `TERMUX_PKG_SHA256` were re-resolved via GitHub Release, then Git
          tag, then commit SHA (in that order).

          **This PR is not auto-merged.** Version numbers change for every
          package touched here, so please review the diff before merging,
          same as any other contributor PR.
          EOF
          )"

      - name: Summary
        if: steps.check.outputs.changed == 'false'
        run: |
          echo "No floating sources needed re-pinning, or all resolutions failed." >> "$GITHUB_STEP_SUMMARY"
