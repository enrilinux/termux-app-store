name: Build Termux Repository

permissions:
  contents: write

on:
  push:
    branches: [master]
    paths:
      - 'tools/index.json'
      - 'termux_app_store/__init__.py'
      - 'termux_app_store/main.py'
      - 'termux_app_store/termux_app_store.py'
      - 'termux_app_store/termux_app_store_cli.py'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: sudo apt-get install -y -qq dpkg-dev

      - name: Read version and package count
        id: meta
        run: |
          VERSION=$(python3 -c "
          import re
          with open('termux_app_store/__init__.py') as f:
              m = re.search(r'__version__\s*=\s*[\"\']([\w.\-]+)', f.read())
              print(m.group(1) if m else '0.0.0')
          ")
          TOTAL=$(python3 -c "
          import json
          with open('tools/index.json') as f:
              d = json.load(f)
          print(d.get('total', len(d.get('packages', []))))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL"     >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION  |  Packages in index: $TOTAL"

      - name: Build termux-app-store .deb for all architectures
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          mkdir -p output

          LAUNCHER_B64="IyEvZGF0YS9kYXRhL2NvbS50ZXJtdXgvZmlsZXMvdXNyL2Jpbi9weXRob24zCmltcG9ydCBzeXMKc3lzLnBhdGguaW5zZXJ0KDAsICIvZGF0YS9kYXRhL2NvbS50ZXJtdXgvZmlsZXMvdXNyL2xpYi9weXRob24zL2Rpc3QtcGFja2FnZXMiKQpmcm9tIHRlcm11eF9hcHBfc3RvcmUubWFpbiBpbXBvcnQgbWFpbgptYWluKCkK"

          for ARCH in aarch64 arm x86_64 i686; do
            PKG_BUILD="build_tmp/termux-app-store_${ARCH}"
            PREFIX="$PKG_BUILD/data/data/com.termux/files/usr"
            PYDIR="$PREFIX/lib/python3/dist-packages/termux_app_store"
            BINDIR="$PREFIX/bin"
            mkdir -p "$PKG_BUILD/DEBIAN" "$PYDIR" "$BINDIR"

            cp -r termux_app_store/. "$PYDIR/"

            echo "$LAUNCHER_B64" | base64 -d > "$BINDIR/termux-app-store"
            chmod +x "$BINDIR/termux-app-store"

            INSTALLED_SIZE=$(du -sk "$PKG_BUILD/data" | cut -f1)
            printf 'Package: termux-app-store\n'                                        > "$PKG_BUILD/DEBIAN/control"
            printf 'Version: %s\n'           "$VERSION"                               >> "$PKG_BUILD/DEBIAN/control"
            printf 'Architecture: %s\n'      "$ARCH"                                  >> "$PKG_BUILD/DEBIAN/control"
            printf 'Maintainer: djunekz <gab288.gab288@passinbox.com>\n'              >> "$PKG_BUILD/DEBIAN/control"
            printf 'Installed-Size: %s\n'    "$INSTALLED_SIZE"                        >> "$PKG_BUILD/DEBIAN/control"
            printf 'Depends: python, python-pip\n'                                    >> "$PKG_BUILD/DEBIAN/control"
            printf 'Homepage: https://github.com/djunekz/termux-app-store\n'          >> "$PKG_BUILD/DEBIAN/control"
            printf 'Description: The first offline-first, source-based TUI package manager for Termux\n' >> "$PKG_BUILD/DEBIAN/control"

            if dpkg-deb --build "$PKG_BUILD" "output/termux-app-store_${VERSION}_${ARCH}.deb" 2>/dev/null; then
              echo "  [OK] termux-app-store_${VERSION}_${ARCH}.deb"
            else
              echo "  [FAIL] termux-app-store_${VERSION}_${ARCH}.deb"
            fi
          done

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Initialize gh-pages if missing
        run: |
          if [ ! -d "gh-pages/.git" ]; then
            mkdir -p gh-pages
            cd gh-pages
            git init
            git remote add origin \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git checkout --orphan gh-pages
          fi
          for arch in aarch64 arm x86_64 i686; do
            mkdir -p "gh-pages/dists/termux/main/binary-${arch}"
          done
          mkdir -p gh-pages/pool/main

      - name: Update pool
        run: |
          rm -f gh-pages/pool/main/termux-app-store_*.deb
          cp output/termux-app-store_*.deb gh-pages/pool/main/
          echo "Pool contents:"
          ls gh-pages/pool/main/

      - name: Generate Packages index per architecture
        run: |
          cd gh-pages
          for arch in aarch64 arm x86_64 i686; do
            DIR="dists/termux/main/binary-${arch}"
            mkdir -p "$DIR"
            > "$DIR/Packages"

            for deb in pool/main/*_${arch}.deb; do
              [ -f "$deb" ] || continue

              pkg_name=$(dpkg-deb -f "$deb" Package         2>/dev/null || true)
              pkg_ver=$( dpkg-deb -f "$deb" Version         2>/dev/null || true)
              pkg_arch=$(dpkg-deb -f "$deb" Architecture    2>/dev/null || true)
              pkg_maint=$(dpkg-deb -f "$deb" Maintainer     2>/dev/null || true)
              pkg_isize=$(dpkg-deb -f "$deb" Installed-Size 2>/dev/null || true)
              pkg_dep=$(  dpkg-deb -f "$deb" Depends        2>/dev/null || true)
              pkg_home=$( dpkg-deb -f "$deb" Homepage       2>/dev/null || true)
              pkg_desc=$( dpkg-deb -f "$deb" Description    2>/dev/null || true)

              file_size=$(wc -c < "$deb")
              md5=$(md5sum    "$deb" | cut -d' ' -f1)
              sha1=$(sha1sum  "$deb" | cut -d' ' -f1)
              sha256=$(sha256sum "$deb" | cut -d' ' -f1)

              {
                echo "Package: $pkg_name"
                echo "Version: $pkg_ver"
                echo "Architecture: $pkg_arch"
                echo "Maintainer: $pkg_maint"
                echo "Installed-Size: $pkg_isize"
                [ -n "$pkg_dep" ]  && echo "Depends: $pkg_dep"
                [ -n "$pkg_home" ] && echo "Homepage: $pkg_home"
                echo "Filename: $deb"
                echo "Size: $file_size"
                echo "MD5sum: $md5"
                echo "SHA1: $sha1"
                echo "SHA256: $sha256"
                echo "Description: $pkg_desc"
                echo ""
              } >> "$DIR/Packages"
            done

            rm -f "$DIR/Packages.gz"
            gzip -k "$DIR/Packages"
            echo "  [$arch] $(grep -c '^Package:' "$DIR/Packages") package(s)"
          done

      - name: Generate Release file
        run: |
          cd gh-pages
          {
            printf 'Origin: Termux App Store\n'
            printf 'Label: Termux App Store\n'
            printf 'Suite: termux\n'
            printf 'Codename: termux\n'
            printf 'Components: main\n'
            printf 'Architectures: aarch64 arm x86_64 i686\n'
            printf 'Description: Official Termux repository by @djunekz\n'
            printf 'Date: %s\n' "$(date -u '+%a, %d %b %Y %H:%M:%S UTC')"
          } > dists/termux/Release
          cd dists/termux
          for algo in MD5Sum SHA256; do
            echo "$algo:" >> Release
            for arch in aarch64 arm x86_64 i686; do
              for f in "main/binary-${arch}/Packages" "main/binary-${arch}/Packages.gz"; do
                [ -f "$f" ] || continue
                SIZE=$(wc -c < "$f")
                if [ "$algo" = "MD5Sum" ]; then
                  HASH=$(md5sum "$f" | cut -d' ' -f1)
                else
                  HASH=$(sha256sum "$f" | cut -d' ' -f1)
                fi
                echo " $HASH $SIZE $f" >> Release
              done
            done
          done

      - name: Copy install-repo.py
        run: cp install-repo.py gh-pages/install-repo.py

      - name: Generate index.html
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TOTAL:   ${{ steps.meta.outputs.total }}
