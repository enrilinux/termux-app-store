name: Auto Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Python package
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Remove sdist tarball (replaced by full release archive)
        run: rm -f dist/*.tar.gz

      - name: Build full release archive
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE="termux-app-store-${VERSION}.tar.gz"
          tar -czf "$ARCHIVE" \
            tools/ \
            packages/ \
            termux-build \
            build-package.sh \
            tasctl \
            install.sh \
            uninstall.sh \
            install-repo.py \
            guidebook.py \
            pkg-scaffold.py \
            doctor.py \
            pyproject.toml \
            MANIFEST.in \
            termux_app_store/ \
            ARCHITECTURE.md \
            BINARY_DISCLAIMER.md \
            CHANGELOG.md \
            CODE_OF_CONDUCT.md \
            CONTRIBUTING.md \
            DISCLAIMER.md \
            FAQ.md \
            GOVERNANCE.md \
            HOW_TO_UPLOAD.md \
            INSTALL.md \
            LICENSE \
            PRIVACY.md \
            README.md \
            README.id.md \
            README.in.md \
            README.ch.md \
            README.jp.md \
            README.th.md \
            README.vi.md \
            SECURITY.md \
            SUPPORT.md \
            TROUBLESHOOTING.md
          mv "$ARCHIVE" dist/

      - name: Generate SHA256 checksums
        run: |
          cd dist
          for f in *.whl *.tar.gz; do
            [[ -f "$f" ]] && sha256sum "$f" > "${f}.sha256"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: dist
          path: dist/

  attest:
    name: Attest build artifacts
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/

      - name: Attest distributions
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

  release:
    name: Auto Release
    needs: attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_BARE="${VERSION#v}"

          echo "Looking for changelog entry: [${VERSION_BARE}]"

          awk "/^## \[${VERSION_BARE}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md \
            | sed '/./,$!d' \
            | sed -e :a -e '/^\s*$/{$d;N;ba}' \
            > release_notes.txt

          # Fail loudly — do NOT silently fall back to a generic message
          if [[ ! -s release_notes.txt ]]; then
            echo "ERROR: No changelog entry found for [${VERSION_BARE}]"
            echo "Entries available in CHANGELOG.md:"
            grep "^## \[" CHANGELOG.md
            exit 1
          fi

          echo "── Release notes preview ──"
          cat release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3
        with:
          name: "Termux-App-Store ${{ steps.version.outputs.version }}"
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sha256
