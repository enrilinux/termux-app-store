name: Auto Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.14"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Python package
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Build full release archive
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE="termux-app-store-${VERSION}.tar.gz"
          tar -czf "$ARCHIVE" \
            tools/ \
            termux-build \
            build-package.sh \
            tasctl \
            install.sh \
            uninstall.sh \
            install-repo.py \
            guidebook.py \
            pkg-scaffold.py \
            doctor.py \
            pyproject.toml \
            MANIFEST.in \
            termux_app_store/ \
            ARCHITECTURE.md \
            BINARY_DISCLAIMER.md \
            CHANGELOG.md \
            CODE_OF_CONDUCT.md \
            CONTRIBUTING.md \
            DISCLAIMER.md \
            FAQ.md \
            GOVERNANCE.md \
            HOW_TO_UPLOAD.md \
            INSTALL.md \
            LICENSE \
            PRIVACY.md \
            README.md \
            README.id.md \
            README.in.md \
            README.ch.md \
            README.jp.md \
            README.th.md \
            README.vi.md \
            SECURITY.md \
            SUPPORT.md \
            TROUBLESHOOTING.md
          mv "$ARCHIVE" dist/

      - name: Generate SHA256 checksums
        run: |
          cd dist
          for f in *.whl *.tar.gz; do
            [[ -f "$f" ]] && sha256sum "$f" > "${f}.sha256"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  attest:
    name: Attest build artifacts
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Attest distributions
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

  release:
    name: Auto Release
    needs: attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_BARE="${VERSION#v}"
          NOTES=$(awk "/^## \[${VERSION_BARE}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [[ -z "$NOTES" ]]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          name: "Termux-App-Store ${{ steps.version.outputs.version }}"
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sha256
