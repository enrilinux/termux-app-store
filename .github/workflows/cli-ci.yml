name: CLI-Validation

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  cli-validation:
    name: CLI-Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ github.event_name == 'push' && secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Make scripts executable
        run: |
          chmod +x termux-build || true
          chmod +x tasctl || true

      - name: Run termux-build validation (Python)
        id: validate
        run: |
          python ci/run_termux_build.py
        continue-on-error: true

      - name: Auto-fix SHA256 mismatches
        if: steps.validate.outcome == 'failure' && github.event_name == 'push'
        id: fix_sha256
        run: |
          echo "Validation failed — checking for SHA256 mismatches..."
          python ci/run_fix_sha256.py
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Re-run validation after SHA256 fix
        if: steps.fix_sha256.outcome == 'success'
        run: |
          echo "Re-running validation after SHA256 fixes..."
          python ci/run_termux_build.py

      - name: Fail if validation failed on PR
        if: steps.validate.outcome == 'failure' && github.event_name == 'pull_request'
        run: |
          echo "Validation failed on PR — please fix manually"
          exit 1
