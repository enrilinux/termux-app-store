name: Build Package .deb Files

permissions:
  contents: write

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday 02:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild (ignore cache)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  detect-packages:
    name: Detect Packages to Build
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      package_count: ${{ steps.detect.outputs.package_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Scan packages directory
        id: detect
        run: |
          PACKAGES=()
          
          for pkg_dir in packages/*/; do
            PKG_NAME=$(basename "$pkg_dir")
            BUILD_SH="$pkg_dir/build.sh"
            
            if [[ -f "$BUILD_SH" ]]; then
              PACKAGES+=("$PKG_NAME")
            fi
          done
          
          if [[ ${#PACKAGES[@]} -eq 0 ]]; then
            echo "packages=[]" >> "$GITHUB_OUTPUT"
            echo "package_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          PACKAGES_JSON=$(printf '%s\n' "${PACKAGES[@]}" | jq -R . | jq -s .)
          echo "packages=$PACKAGES_JSON" >> "$GITHUB_OUTPUT"
          echo "package_count=${#PACKAGES[@]}" >> "$GITHUB_OUTPUT"
          
          echo "Found ${#PACKAGES[@]} packages"

  build-packages:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: detect-packages
    if: needs.detect-packages.outputs.package_count > 0
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-packages.outputs.packages) }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Extract package metadata
        id: meta
        run: |
          BUILD_SH="packages/${{ matrix.package }}/build.sh"
          VERSION=$(grep 'TERMUX_PKG_VERSION=' "$BUILD_SH" | head -1 | cut -d= -f2 | tr -d "\"'" || echo "0.0.0")
          SHA256=$(grep 'TERMUX_PKG_SHA256=' "$BUILD_SH" | head -1 | cut -d= -f2 | tr -d "\"'" | cut -c1-16 || echo "")
          
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Check cache
        id: cache
        if: github.event.inputs.force != 'true'
        uses: actions/cache@v4
        with:
          path: output/
          key: pkg-${{ matrix.package }}-${{ steps.meta.outputs.version }}
          restore-keys: pkg-${{ matrix.package }}-

      - name: Set up QEMU
        if: github.event.inputs.force == 'true' || steps.cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build with build-package.sh
        if: github.event.inputs.force == 'true' || steps.cache.outputs.cache-hit != 'true'
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${PWD}:/repo"
          install: |
            apt-get update -qq
            apt-get install -y -qq git
            git config --global --add safe.directory /repo
            git config --global --add safe.directory '*'
            apt-get install -y -qq \
              dpkg-dev curl file python3 python3-pip python3-setuptools \
              build-essential cmake wget sudo pkg-config nodejs npm \
              perl lua5.4 php-cli patchelf autoconf automake libtool \
              zlib1g-dev libssl-dev libffi-dev libfontconfig1-dev libfreetype-dev \
              libglib2.0-dev libxml2-dev libxslt1-dev unzip tar gzip jq bash coreutils findutils
            curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
            . /root/.cargo/env
            GO_VER=$(curl -sSf https://go.dev/VERSION?m=text | head -1)
            curl -sSfL "https://go.dev/dl/${GO_VER}.linux-arm64.tar.gz" | tar -C /usr/local -xz
            ln -sf /usr/local/go/bin/go /usr/local/bin/go
          
          run: |
            set -e
            . /root/.cargo/env 2>/dev/null || true
            export PATH=$PATH:/usr/local/go/bin:/root/.cargo/bin
            cd /repo
            
            echo "Building: ${{ matrix.package }}"
            bash ./build-package.sh "${{ matrix.package }}"

      - name: Generate SHA256
        if: always()
        run: |
          mkdir -p output
          cd output
          for deb in *.deb; do
            [[ -f "$deb" ]] && sha256sum "$deb" > "${deb}.sha256"
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ steps.meta.outputs.version }}
          path: |
            output/*.deb
            output/*.sha256
          retention-days: 7
          if-no-files-found: warn

  publish:
    name: Publish to gh-pages
    runs-on: ubuntu-latest
    needs: build-packages
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare pool
        run: |
          mkdir -p pool/main
          find artifacts -name "*.deb" -exec cp {} pool/main/ \;
          find artifacts -name "*.sha256" -exec cp {} pool/main/ \;

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Setup gh-pages
        run: |
          mkdir -p gh-pages/pool/main
          mkdir -p gh-pages/dists/termux/main/binary-{aarch64,arm,x86_64,i686,all}
          mkdir -p gh-pages/tools

      - name: Update pool
        run: |
          cp pool/main/*.deb gh-pages/pool/main/ 2>/dev/null || true
          cp pool/main/*.sha256 gh-pages/pool/main/ 2>/dev/null || true

      - name: Generate index
        run: |
          python3 << 'PYTHON'
          import subprocess, hashlib
          from pathlib import Path
          from datetime import datetime, timezone
          
          pool = Path("gh-pages/pool/main")
          for arch in ["aarch64", "arm", "x86_64", "i686", "all"]:
              out = Path(f"gh-pages/dists/termux/main/binary-{arch}")
              out.mkdir(parents=True, exist_ok=True)
              
              entries = []
              for deb in sorted(pool.glob(f"*_{arch}.deb")):
                  result = subprocess.run(["dpkg-deb", "-f", str(deb)], capture_output=True, text=True)
                  data = deb.read_bytes()
                  entries.append(result.stdout.strip() + f"\nFilename: pool/main/{deb.name}\nSize: {len(data)}\nSHA256: {hashlib.sha256(data).hexdigest()}\n")
              
              (out / "Packages").write_text("\n".join(entries))
              subprocess.run(["gzip", "-kf", str(out / "Packages")])
          
          date_str = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S UTC")
          release = f"Origin: Termux App Store\nLabel: Termux App Store\nSuite: termux\nCodename: termux\nComponents: main\nArchitectures: aarch64 arm x86_64 i686 all\nDate: {date_str}\n"
          Path("gh-pages/dists/termux/Release").write_text(release)
          PYTHON

      - name: Update index.json
        run: |
          cp tools/index.json gh-pages/tools/index.json

      - name: Push gh-pages
        run: |
          cd gh-pages
          git config user.email "258516621+termux-app-store@users.noreply.github.com"
          git config user.name "Termux App Store"
          git add -A
          COUNT=$(ls pool/main/*.deb 2>/dev/null | wc -l || echo 0)
          if ! git diff --staged --quiet; then
            git commit -m "build: update .deb pool — ${COUNT} packages"
            git push origin HEAD:gh-pages
          fi
