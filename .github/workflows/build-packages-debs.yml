name: Build Package .deb Files

permissions:
  contents: write

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package spesifik (kosong = semua yang berubah)'
        required: false
        default: ''
      force:
        description: 'Force rebuild (ignore cache)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  detect-changes:
    name: Detect Packages to Build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_packages: ${{ steps.detect.outputs.has_packages }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 2

      - name: Detect packages to build
        id: detect
        run: |
          SPECIFIC="${{ github.event.inputs.package }}"
          FORCE="${{ github.event.inputs.force }}"
          TRIGGER="${{ github.event_name }}"

          if [[ -n "$SPECIFIC" ]]; then
            [[ -f "packages/$SPECIFIC/build.sh" ]] || { echo "Package '$SPECIFIC' not found"; exit 1; }
            PKGS="$SPECIFIC"
          elif [[ "$FORCE" == "true" || "$TRIGGER" == "schedule" ]]; then
            PKGS=$(ls packages/ 2>/dev/null | tr '\n' ' ')
          else
            PKGS=$(python3 -c "
          import json, subprocess
          try:
              old = {p['package']:p.get('version','') for p in json.loads(
                  subprocess.check_output(['git','show','HEAD~1:tools/index.json'],
                  stderr=subprocess.DEVNULL).decode()).get('packages',[])}
          except:
              old = {}
          new = {p['package']:p.get('version','') for p in json.load(open('tools/index.json')).get('packages',[])}
          print(' '.join(pkg for pkg,ver in new.items() if old.get(pkg,'') != ver))
          " 2>/dev/null || echo "")
          fi

          if [[ -z "$(echo $PKGS | tr -d ' ')" ]]; then
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATRIX_ITEMS=""
          for pkg in $PKGS; do
            [[ -f "packages/$pkg/build.sh" ]] || continue
            VERSION=$(grep 'TERMUX_PKG_VERSION=' "packages/$pkg/build.sh" \
              | head -1 | cut -d= -f2 | tr -d "\"'" 2>/dev/null || echo "unknown")
            SHA256=$(grep 'TERMUX_PKG_SHA256=' "packages/$pkg/build.sh" \
              | head -1 | cut -d= -f2 | tr -d "\"'" 2>/dev/null | cut -c1-16 || echo "")
            [[ -n "$MATRIX_ITEMS" ]] && MATRIX_ITEMS="$MATRIX_ITEMS,"
            MATRIX_ITEMS="${MATRIX_ITEMS}{\"package\":\"$pkg\",\"version\":\"$VERSION\",\"sha256\":\"$SHA256\"}"
          done

          echo "matrix={\"include\":[$MATRIX_ITEMS]}" >> "$GITHUB_OUTPUT"
          echo "has_packages=true" >> "$GITHUB_OUTPUT"
          echo "Packages to build: $PKGS"

  build-deb:
    name: Build ${{ matrix.package }} v${{ matrix.version }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_packages == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check binary cache
        id: cache
        if: github.event.inputs.force != 'true'
        uses: actions/cache@v4
        with:
          path: output/
          key: pkg-${{ matrix.package }}-${{ matrix.version }}-${{ matrix.sha256 }}
          restore-keys: |
            pkg-${{ matrix.package }}-${{ matrix.version }}-
            pkg-${{ matrix.package }}-

      - name: Set up QEMU
        if: github.event.inputs.force == 'true' || steps.cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64,linux/arm/v7

      - name: Build .deb di aarch64 via QEMU
        if: github.event.inputs.force == 'true' || steps.cache.outputs.cache-hit != 'true'
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${PWD}:/repo"
          install: |
            apt-get update -qq
            apt-get install -y -qq \
              dpkg-dev curl file python3 python3-pip \
              build-essential cmake git wget \
              nodejs npm \
              cargo \
              golang-go \
              ruby gem \
              perl lua5.3 php-cli \
              patchelf pkg-config \
              autoconf automake libtool \
              zlib1g-dev libssl-dev libffi-dev
          run: |
            cd /repo
            PKG="${{ matrix.package }}"
            mkdir -p output

            # Buat path Termux agar build-package.sh tidak error
            # build-package.sh menginstall ke PREFIX, kita arahkan ke folder runner
            TERMUX_PREFIX="/data/data/com.termux/files/usr"
            mkdir -p "$TERMUX_PREFIX/bin" "$TERMUX_PREFIX/lib"                      "$TERMUX_PREFIX/include" "$TERMUX_PREFIX/share"                      "$TERMUX_PREFIX/etc" "$TERMUX_PREFIX/tmp"

            # Symlink tools standar supaya script install tidak gagal
            for tool in bash sh python3 python perl ruby node npm; do
              BIN=$(command -v $tool 2>/dev/null || true)
              [[ -n "$BIN" && ! -e "$TERMUX_PREFIX/bin/$tool" ]] &&                 ln -sf "$BIN" "$TERMUX_PREFIX/bin/$tool" || true
            done

            echo "Building $PKG for aarch64..."
            bash build-package.sh "$PKG" 2>&1

            BUILT=$(ls output/${PKG}_*.deb 2>/dev/null | head -1)
            if [[ -z "$BUILT" ]]; then
              echo "build-package.sh did not produce a .deb"
              exit 1
            fi

            VERSION=$(dpkg-deb -f "$BUILT" Version 2>/dev/null || echo "unknown")
            ARCH=$(dpkg-deb -f "$BUILT" Architecture 2>/dev/null || echo "unknown")
            echo "Built: $(basename $BUILT) — arch=$ARCH version=$VERSION"

            # Generate SHA256 di dalam container (hindari permission denied di host)
            cd output
            for f in *.deb; do
              sha256sum "$f" > "${f}.sha256"
              echo "SHA256: $f"
            done
            cd ..

            # Fix permission agar host runner bisa akses
            chmod -R 777 output/
            ls -lh output/

      - name: Generate SHA256 checksums
        run: |
          mkdir -p output
          cd output
          shopt -s nullglob
          debs=(*.deb)
          if [[ ${#debs[@]} -eq 0 ]]; then
            echo "No .deb files (build skipped or failed)"
            exit 0
          fi
          # SHA256 sudah di-generate di dalam QEMU
          # Pastikan file ada, kalau belum generate ulang
          for f in "${debs[@]}"; do
            [[ -f "${f}.sha256" ]] || sha256sum "$f" > "${f}.sha256"
            echo "OK: ${f}.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: deb-${{ matrix.package }}-${{ matrix.version }}
          path: |
            output/*.deb
            output/*.sha256
          retention-days: 7
          if-no-files-found: warn

  publish:
    name: Publish .deb to gh-pages
    runs-on: ubuntu-latest
    needs: [detect-changes, build-deb]
    if: |
      always() &&
      needs.detect-changes.outputs.has_packages == 'true' &&
      needs.build-deb.result != 'cancelled'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install tools
        run: sudo apt-get install -y -qq dpkg-dev python3

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v4
        with:
          pattern: deb-*
          path: all-debs/
          merge-multiple: true

      - name: Checkout gh-pages
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Initialize gh-pages if missing
        run: |
          if [[ ! -d "gh-pages/.git" ]]; then
            mkdir -p gh-pages && cd gh-pages
            git init
            git remote add origin \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git checkout --orphan gh-pages
          fi
          mkdir -p gh-pages/pool/main
          for arch in aarch64 arm x86_64 i686; do
            mkdir -p "gh-pages/dists/termux/main/binary-${arch}"
          done

      - name: Purge old .deb (force rebuild only)
        if: github.event.inputs.force == 'true'
        run: |
          SPECIFIC="${{ github.event.inputs.package }}"
          if [[ -n "$SPECIFIC" ]]; then
            rm -f "gh-pages/pool/main/${SPECIFIC}_"*.deb \
                  "gh-pages/pool/main/${SPECIFIC}_"*.sha256
            echo "Removed old .deb for: $SPECIFIC"
          else
            rm -f gh-pages/pool/main/*.deb gh-pages/pool/main/*.sha256
            echo "Removed ALL old .deb files"
          fi

      - name: Update pool (incremental)
        run: |
          ADDED=0
          for deb in all-debs/*.deb; do
            [[ -f "$deb" ]] || continue
            fname=$(basename "$deb")
            PKG=$(echo "$fname"  | sed 's/_[^_]*_[^_]*\.deb$//')
            ARCH=$(echo "$fname" | sed 's/.*_\([^_]*\)\.deb$/\1/')
            for old in "gh-pages/pool/main/${PKG}_"*"_${ARCH}.deb"; do
              [[ -f "$old" && "$(basename $old)" != "$fname" ]] && \
                rm -f "$old" "${old}.sha256" && echo "  Removed: $(basename $old)"
            done
            cp "$deb" "gh-pages/pool/main/"
            [[ -f "${deb}.sha256" ]] && cp "${deb}.sha256" "gh-pages/pool/main/"
            echo "  Added: $fname"
            ADDED=$((ADDED+1))
          done
          echo "Pool: $ADDED added, $(ls gh-pages/pool/main/*.deb 2>/dev/null | wc -l) total"

      - name: Generate Packages index and Release
        run: |
          python3 - <<'EOF'
          import hashlib, subprocess
          from pathlib import Path
          from datetime import datetime, timezone

          pool  = Path("gh-pages/pool/main")
          archs = ["aarch64", "arm", "x86_64", "i686"]

          for arch in archs:
              out_dir = Path(f"gh-pages/dists/termux/main/binary-{arch}")
              out_dir.mkdir(parents=True, exist_ok=True)
              entries = []
              for deb in sorted(pool.glob(f"*_{arch}.deb")):
                  def field(f, d=deb):
                      return subprocess.run(
                          ["dpkg-deb", "-f", str(d), f],
                          capture_output=True, text=True
                      ).stdout.strip()
                  data = deb.read_bytes()
                  lines = [
                      f"Package: {field('Package')}",
                      f"Version: {field('Version')}",
                      f"Architecture: {field('Architecture')}",
                      f"Maintainer: {field('Maintainer')}",
                      f"Installed-Size: {field('Installed-Size')}",
                  ]
                  dep  = field("Depends")
                  home = field("Homepage")
                  if dep:  lines.append(f"Depends: {dep}")
                  if home: lines.append(f"Homepage: {home}")
                  lines += [
                      f"Filename: {deb.relative_to('gh-pages')}",
                      f"Size: {len(data)}",
                      f"MD5sum: {hashlib.md5(data).hexdigest()}",
                      f"SHA1: {hashlib.sha1(data).hexdigest()}",
                      f"SHA256: {hashlib.sha256(data).hexdigest()}",
                      f"Description: {field('Description')}",
                      "",
                  ]
                  entries.append("\n".join(lines))
              pkg_file = out_dir / "Packages"
              pkg_file.write_text("\n".join(entries))
              gz = out_dir / "Packages.gz"
              gz.unlink(missing_ok=True)
              subprocess.run(["gzip", "-k", str(pkg_file)])
              print(f"  [{arch}] {len(entries)} packages")

          date_str = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S UTC")
          rel_lines = [
              "Origin: Termux App Store", "Label: Termux App Store",
              "Suite: termux", "Codename: termux", "Components: main",
              f"Architectures: {' '.join(archs)}",
              "Description: Official Termux repository by @djunekz",
              f"Date: {date_str}",
          ]
          for algo in ["MD5Sum", "SHA256"]:
              rel_lines.append(f"{algo}:")
              for arch in archs:
                  for fname in [f"main/binary-{arch}/Packages",
                                 f"main/binary-{arch}/Packages.gz"]:
                      p = Path(f"gh-pages/dists/termux/{fname}")
                      if not p.exists(): continue
                      data = p.read_bytes()
                      h = hashlib.md5(data).hexdigest() if algo == "MD5Sum" \
                          else hashlib.sha256(data).hexdigest()
                      rel_lines.append(f" {h} {len(data)} {fname}")
          Path("gh-pages/dists/termux/Release").write_text("\n".join(rel_lines) + "\n")
          print("Release file generated")
          EOF

      - name: Update index.json with .deb SHA256 hashes
        run: |
          mkdir -p gh-pages/tools
          cp tools/index.json gh-pages/tools/index.json
          python3 - <<'EOF'
          import json, hashlib
          from pathlib import Path

          index_path = Path("gh-pages/tools/index.json")
          pool_dir   = Path("gh-pages/pool/main")

          with open(index_path) as f:
              data = json.load(f)

          updated = 0
          for pkg in data.get("packages", []):
              name = pkg.get("package", "")
              ver  = pkg.get("version", "")
              debs = sorted(pool_dir.glob(f"{name}_{ver}_*.deb"))
              if not debs:
                  debs = sorted(pool_dir.glob(f"{name}_*.deb"))
              if not debs:
                  continue
              arch_hashes = {}
              for deb in debs:
                  arch = deb.stem.rsplit("_", 1)[-1]
                  arch_hashes[arch] = hashlib.sha256(deb.read_bytes()).hexdigest()
              if not arch_hashes:
                  continue
              primary = arch_hashes.get("aarch64") or next(iter(arch_hashes.values()))
              pkg["sha256"] = primary
              pkg["sha256_by_arch"] = arch_hashes
              updated += 1

          with open(index_path, "w") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          print(f"Updated SHA256 for {updated} package(s)")
          EOF

      - name: Commit and push
        run: |
          cd gh-pages
          git config user.email "258516621+termux-app-store@users.noreply.github.com"
          git config user.name "Termux App Store"
          git add -A
          COUNT=$(ls pool/main/*.deb 2>/dev/null | wc -l || echo 0)
          MSG="pkg: update pool — ${COUNT} .deb files [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git diff --staged --quiet && echo "Nothing to commit" || \
            (git commit -m "$MSG" && git push origin HEAD:gh-pages && echo "Pushed: $MSG")

      - name: Summary
        run: |
          COUNT=$(ls gh-pages/pool/main/*.deb 2>/dev/null | wc -l || echo 0)
          echo "## Summary" >> $GITHUB_STEP_SUMMARY
          echo "**$COUNT** .deb files in pool" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pool Contents" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls gh-pages/pool/main/*.deb 2>/dev/null | xargs -I{} basename {} | sort \
            >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
