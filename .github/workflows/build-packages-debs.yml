name: Build Package .deb Files

permissions:
  contents: write

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package spesifik (kosong = build semua yang berubah)'
        required: false
        default: ''
      force:
        description: 'Force rebuild (ignore cache)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  detect-changes:
    name: Detect Packages to Build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_packages: ${{ steps.detect.outputs.has_packages }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 2

      - name: Detect packages to build
        id: detect
        run: |
          SPECIFIC="${{ github.event.inputs.package }}"
          FORCE="${{ github.event.inputs.force }}"
          TRIGGER="${{ github.event_name }}"

          if [[ -n "$SPECIFIC" ]]; then
            PKGS=$(echo "$SPECIFIC" | tr ',' ' ')
            for _pkg in $PKGS; do
              [[ -f "packages/$_pkg/build.sh" ]] || { echo "Package '$_pkg' not found"; exit 1; }
            done
          elif [[ "$FORCE" == "true" || "$TRIGGER" == "schedule" ]]; then
            PKGS=$(ls packages/ 2>/dev/null | tr '\n' ' ')
          else
            PKGS=$(python3 -c "
          import json, subprocess
          try:
              old = {p['package']:p.get('version','') for p in json.loads(subprocess.check_output(['git','show','HEAD~1:tools/index.json'],stderr=subprocess.DEVNULL).decode()).get('packages',[])}
          except:
              old = {}
          new = {p['package']:p.get('version','') for p in json.load(open('tools/index.json')).get('packages',[])}
          print(' '.join(pkg for pkg,ver in new.items() if old.get(pkg,'') != ver))
          " 2>/dev/null || echo "")
          fi

          if [[ -z "$(echo $PKGS | tr -d ' ')" ]]; then
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATRIX_ITEMS=""
          for pkg in $PKGS; do
            [[ -f "packages/$pkg/build.sh" ]] || continue
            VERSION=$(grep 'TERMUX_PKG_VERSION=' "packages/$pkg/build.sh" | head -1 | cut -d= -f2 | tr -d "\"'" 2>/dev/null || echo "unknown")
            SHA256=$(grep 'TERMUX_PKG_SHA256=' "packages/$pkg/build.sh" | head -1 | cut -d= -f2 | tr -d "\"'" 2>/dev/null | cut -c1-16 || echo "")
            SRCURL=$(grep 'TERMUX_PKG_SRCURL=' "packages/$pkg/build.sh" | head -1 | cut -d= -f2- | tr -d "\"'" | sed "s|\${TERMUX_PKG_VERSION}|$VERSION|g" 2>/dev/null || echo "")
            IS_PREBUILT_DEB=false
            if echo "$SRCURL" | grep -q '\.deb$'; then IS_PREBUILT_DEB=true; fi
            [[ -n "$MATRIX_ITEMS" ]] && MATRIX_ITEMS="$MATRIX_ITEMS,"
            MATRIX_ITEMS="${MATRIX_ITEMS}{\"package\":\"$pkg\",\"version\":\"$VERSION\",\"sha256\":\"$SHA256\",\"is_prebuilt_deb\":\"$IS_PREBUILT_DEB\",\"srcurl\":\"$SRCURL\"}"
          done

          echo "matrix={\"include\":[$MATRIX_ITEMS]}" >> "$GITHUB_OUTPUT"
          echo "has_packages=true" >> "$GITHUB_OUTPUT"

  build-deb:
    name: Build ${{ matrix.package }} v${{ matrix.version }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_packages == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Check binary cache
        id: cache
        if: github.event.inputs.force != 'true'
        uses: actions/cache@v5
        with:
          path: output/
          key: pkg-${{ matrix.package }}-${{ matrix.version }}-${{ matrix.sha256 }}
          restore-keys: |
            pkg-${{ matrix.package }}-${{ matrix.version }}-
            pkg-${{ matrix.package }}-

      - name: Repack prebuilt .deb (no Docker needed)
        if: |
          matrix.is_prebuilt_deb == 'true' &&
          (github.event.inputs.force == 'true' || steps.cache.outputs.cache-hit != 'true')
        run: |
          PKG="${{ matrix.package }}"
          VERSION="${{ matrix.version }}"
          SRCURL="${{ matrix.srcurl }}"
          SHA256="${{ matrix.sha256 }}"
          mkdir -p output

          echo "=== Downloading prebuilt .deb ==="
          echo "URL: $SRCURL"
          curl -fsSL "$SRCURL" -o "source.deb" || {
            echo "ERROR: Download failed"
            exit 1
          }

          if [[ -n "$SHA256" ]]; then
            GOTSUM=$(sha256sum source.deb | cut -d' ' -f1)
            if [[ "$GOTSUM" == "$SHA256"* || "$SHA256" == "$GOTSUM"* ]]; then
              echo "Checksum OK"
            else
              echo "WARNING: checksum mismatch (expected prefix: $SHA256, got: $GOTSUM)"
            fi
          fi

          echo "=== Extracting .deb ==="
          TMPDIR_EXTRACT="repack_src"
          mkdir -p "$TMPDIR_EXTRACT"
          dpkg-deb -x source.deb "$TMPDIR_EXTRACT/"
          dpkg-deb -e source.deb "$TMPDIR_EXTRACT/DEBIAN"

          BUILD_SH="packages/$PKG/build.sh"
          HAS_CUSTOM_INSTALL=false
          if grep -q 'termux_step_make_install' "$BUILD_SH" 2>/dev/null; then
            HAS_CUSTOM_INSTALL=true
          fi

          if [[ "$HAS_CUSTOM_INSTALL" == "true" ]]; then
            echo "=== Custom termux_step_make_install() detected — applying ==="
            STAGING="repack_staged"
            mkdir -p "$STAGING"
            PREFIX_ORIG="/data/data/com.termux/files/usr"

            export TERMUX_PREFIX="$PWD/$STAGING$PREFIX_ORIG"
            export TERMUX_PKG_SRCDIR="$PWD/$TMPDIR_EXTRACT"
            mkdir -p "$TERMUX_PREFIX/bin" "$TERMUX_PREFIX/lib/$PKG"

            source "$BUILD_SH" 2>/dev/null || true
            if declare -f termux_step_make_install > /dev/null 2>&1; then
              (cd "$TERMUX_PKG_SRCDIR" && termux_step_make_install) || true
            fi

            mkdir -p "repack_final"
            cp -r "$TMPDIR_EXTRACT/." "repack_final/"
            if [[ -d "$STAGING$PREFIX_ORIG" ]]; then
              cp -r "$STAGING$PREFIX_ORIG/." "repack_final$PREFIX_ORIG/" 2>/dev/null || true
            fi

            mkdir -p "repack_final/DEBIAN"
            cp "$TMPDIR_EXTRACT/DEBIAN/"* "repack_final/DEBIAN/" 2>/dev/null || true
            sed -i "s/^Architecture:.*/Architecture: aarch64/" "repack_final/DEBIAN/control" 2>/dev/null || true

            echo "=== Contents after custom install ==="
            find repack_final -not -path "*/DEBIAN/*" -type f | sed 's|^repack_final||'

            dpkg-deb --build "repack_final" "output/${PKG}_${VERSION}_aarch64.deb"

          else
            echo "=== No custom install — repack as-is for aarch64 ==="
            sed -i "s/^Architecture:.*/Architecture: aarch64/" "$TMPDIR_EXTRACT/DEBIAN/control" 2>/dev/null || true
            dpkg-deb --build "$TMPDIR_EXTRACT" "output/${PKG}_${VERSION}_aarch64.deb"
          fi

          echo "=== Verifying output ==="
          DEB_OUT="output/${PKG}_${VERSION}_aarch64.deb"
          if [[ -f "$DEB_OUT" ]]; then
            echo "OK: $DEB_OUT"
            TMPV=$(mktemp -d)
            dpkg-deb -x "$DEB_OUT" "$TMPV/"
            echo "Contents:"
            find "$TMPV" -type f | sed "s|$TMPV||"
            rm -rf "$TMPV"
          else
            echo "ERROR: .deb not produced"
            exit 1
          fi

      - name: Set up QEMU for aarch64 emulation
        if: |
          matrix.is_prebuilt_deb != 'true' &&
          (github.event.inputs.force == 'true' || steps.cache.outputs.cache-hit != 'true')
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4
        with:
          platforms: arm64

      - name: Build .deb inside termux-docker (aarch64)
        if: |
          matrix.is_prebuilt_deb != 'true' &&
          (github.event.inputs.force == 'true' || steps.cache.outputs.cache-hit != 'true')
        run: |
          mkdir -p output

          WORK_DIR=$(mktemp -d)
          chmod 777 "$WORK_DIR"
          cp -r . "$WORK_DIR/"
          chmod -R 777 "$WORK_DIR"
          mkdir -p "$WORK_DIR/output"

          PKG_DEPS=$(grep 'TERMUX_PKG_DEPENDS=' "packages/${{ matrix.package }}/build.sh" | head -1 \
            | cut -d= -f2 | tr -d "\"'" | tr ',' ' ' | xargs 2>/dev/null || true)

          docker run --rm \
            --platform linux/arm64 \
            -v "$WORK_DIR:/opt/tas" \
            -e "PKG_DEPS=$PKG_DEPS" \
            termux/termux-docker:aarch64 \
            bash -c '
              export HOME=/root
              export PREFIX=/data/data/com.termux/files/usr
              export PATH="$PREFIX/bin:$PATH"
              export TERM=xterm-256color
              mkdir -p "$PREFIX/tmp"
              export TMPDIR="$PREFIX/tmp"

              PKG="${{ matrix.package }}"
              cd /opt/tas

              echo "=== Updating pkg ==="
              pkg update -y -o Dpkg::Options::="--force-confnew" 2>/dev/null || true

              if [[ -n "$PKG_DEPS" ]]; then
                echo "=== Pre-installing dependencies: $PKG_DEPS ==="
                pkg install -y $PKG_DEPS 2>&1 || true
              fi

              echo "=== Building $PKG ==="
              bash build-package.sh "$PKG" 2>&1
              BUILD_EXIT=$?

              echo "=== Output ==="
              ls -lh output/ 2>/dev/null || echo "(no output)"

              [[ $BUILD_EXIT -ne 0 ]] && echo "WARNING: build exit $BUILD_EXIT" || true
            '

          ls "$WORK_DIR/output/"*.deb 2>/dev/null && \
            cp "$WORK_DIR/output/"*.deb output/ || true

          sudo rm -rf "$WORK_DIR" 2>/dev/null || rm -rf "$WORK_DIR" 2>/dev/null || true

      - name: Repackage for all architectures
        if: github.event.inputs.force == 'true' || steps.cache.outputs.cache-hit != 'true'
        run: |
          PKG="${{ matrix.package }}"
          BUILT=$(ls output/${PKG}_*_aarch64.deb 2>/dev/null | head -1)

          if [[ -z "$BUILT" ]]; then
            echo "No aarch64 .deb found — skip repackage"
            exit 0
          fi

          BUILT_VERSION=$(dpkg-deb -f "$BUILT" Version 2>/dev/null || echo "${{ matrix.version }}")
          echo "Repackaging from: $(basename $BUILT) (v$BUILT_VERSION)"

          TMPCHECK="repack_tmp/${PKG}_check"
          mkdir -p "$TMPCHECK"
          dpkg-deb -x "$BUILT" "$TMPCHECK/"

          HAS_ELF=false
          while IFS= read -r -d '' f; do
            magic=$(file -b "$f" 2>/dev/null || true)
            if echo "$magic" | grep -qi "^ELF"; then
              echo "  [ELF detected] $(basename $f) — skipping multi-arch repackage"
              HAS_ELF=true
              break
            fi
          done < <(find "$TMPCHECK" -type f -not -path "*/DEBIAN/*" -print0)
          rm -rf "$TMPCHECK"

          if [[ "$HAS_ELF" == "true" ]]; then
            echo "  Package contains ELF binary — only aarch64 .deb will be published"
            ls -lh output/ || true
            exit 0
          fi

          echo "  No ELF binaries — safe to repackage for all architectures"
          for ARCH in arm x86_64 i686; do
            TARGET="output/${PKG}_${BUILT_VERSION}_${ARCH}.deb"
            [[ -f "$TARGET" ]] && { echo "  [$ARCH] already exists"; continue; }
            TMPDIR_ARCH="repack_tmp/${PKG}_${ARCH}"
            mkdir -p "$TMPDIR_ARCH"
            dpkg-deb -x "$BUILT" "$TMPDIR_ARCH/"
            dpkg-deb -e "$BUILT" "$TMPDIR_ARCH/DEBIAN"
            sed -i "s/^Architecture:.*/Architecture: $ARCH/" "$TMPDIR_ARCH/DEBIAN/control"
            dpkg-deb --build "$TMPDIR_ARCH" "$TARGET" 2>/dev/null && \
              echo "  [$ARCH] OK: $(basename $TARGET)" || echo "  [$ARCH] FAIL"
            rm -rf "$TMPDIR_ARCH"
          done
          ls -lh output/ || true

      - name: Generate SHA256 checksums
        run: |
          mkdir -p output
          cd output
          shopt -s nullglob
          debs=(*.deb)
          if [[ ${#debs[@]} -eq 0 ]]; then
            echo "No .deb files"
            exit 0
          fi
          for f in "${debs[@]}"; do
            sha256sum "$f" > "${f}.sha256"
            echo "  $(sha256sum $f | cut -c1-16)...  $f"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: deb-${{ matrix.package }}-${{ matrix.version }}
          path: |
            output/*.deb
            output/*.sha256
          retention-days: 7
          if-no-files-found: warn

  publish:
    name: Publish .deb to gh-pages
    runs-on: ubuntu-latest
    needs: [detect-changes, build-deb]
    if: |
      always() &&
      needs.detect-changes.outputs.has_packages == 'true' &&
      needs.build-deb.result != 'cancelled'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install tools
        run: sudo apt-get install -y -qq dpkg-dev python3

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: deb-*
          path: all-debs/
          merge-multiple: true

      - name: Checkout gh-pages
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Initialize gh-pages if missing
        run: |
          if [[ ! -d "gh-pages/.git" ]]; then
            mkdir -p gh-pages && cd gh-pages
            git init
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git checkout --orphan gh-pages
          fi
          mkdir -p gh-pages/pool/main
          for arch in aarch64 arm x86_64 i686; do
            mkdir -p "gh-pages/dists/termux/main/binary-${arch}"
          done

      - name: Purge old .deb files from pool (force rebuild only)
        if: github.event.inputs.force == 'true'
        run: |
          SPECIFIC="${{ github.event.inputs.package }}"
          if [[ -n "$SPECIFIC" ]]; then
            rm -f gh-pages/pool/main/${SPECIFIC}_*.deb gh-pages/pool/main/${SPECIFIC}_*.sha256
            echo "Removed old .deb for: $SPECIFIC"
          else
            rm -f gh-pages/pool/main/*.deb gh-pages/pool/main/*.sha256
            echo "Removed ALL old .deb files"
          fi

      - name: Update pool
        run: |
          for deb in all-debs/*.deb; do
            [[ -f "$deb" ]] || continue
            fname=$(basename "$deb")
            PKG=$(echo "$fname"  | sed 's/_[^_]*_[^_]*\.deb$//')
            ARCH=$(echo "$fname" | sed 's/.*_\([^_]*\)\.deb$/\1/')
            for old in "gh-pages/pool/main/${PKG}_"*"_${ARCH}.deb"; do
              [[ -f "$old" && "$(basename $old)" != "$fname" ]] && \
                rm -f "$old" "${old}.sha256" && echo "Removed old: $(basename $old)"
            done
            cp "$deb" "gh-pages/pool/main/"
            [[ -f "${deb}.sha256" ]] && cp "${deb}.sha256" "gh-pages/pool/main/"
            echo "Added: $fname"
          done
          echo "Pool total: $(ls gh-pages/pool/main/*.deb 2>/dev/null | wc -l) .deb files"

      - name: Generate Packages index and Release
        run: |
          python3 - <<'EOF'
          import hashlib, subprocess
          from pathlib import Path
          from datetime import datetime, timezone

          pool  = Path("gh-pages/pool/main")
          archs = ["aarch64", "arm", "x86_64", "i686"]

          for arch in archs:
              out_dir = Path(f"gh-pages/dists/termux/main/binary-{arch}")
              out_dir.mkdir(parents=True, exist_ok=True)
              entries = []
              for deb in sorted(pool.glob(f"*_{arch}.deb")):
                  def field(f, d=deb):
                      return subprocess.run(["dpkg-deb","-f",str(d),f],
                          capture_output=True, text=True).stdout.strip()
                  data = deb.read_bytes()
                  lines = [
                      f"Package: {field('Package')}",
                      f"Version: {field('Version')}",
                      f"Architecture: {arch}",
                      f"Maintainer: {field('Maintainer')}",
                      f"Installed-Size: {field('Installed-Size')}",
                  ]
                  dep  = field("Depends")
                  home = field("Homepage")
                  if dep:  lines.append(f"Depends: {dep}")
                  if home: lines.append(f"Homepage: {home}")
                  lines += [
                      f"Filename: {deb.relative_to('gh-pages')}",
                      f"Size: {len(data)}",
                      f"MD5sum: {hashlib.md5(data).hexdigest()}",
                      f"SHA1: {hashlib.sha1(data).hexdigest()}",
                      f"SHA256: {hashlib.sha256(data).hexdigest()}",
                      f"Description: {field('Description')}",
                      "",
                  ]
                  entries.append("\n".join(lines))
              pkg_file = out_dir / "Packages"
              pkg_file.write_text("\n".join(entries))
              (out_dir / "Packages.gz").unlink(missing_ok=True)
              subprocess.run(["gzip", "-k", str(pkg_file)])
              print(f"  [{arch}] {len(entries)} packages")

          date_str = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S UTC")
          rel = [
              "Origin: Termux App Store", "Label: Termux App Store",
              "Suite: termux", "Codename: termux", "Components: main",
              f"Architectures: {' '.join(archs)}",
              "Description: Official Termux repository by @djunekz",
              f"Date: {date_str}",
          ]
          for algo in ["MD5Sum", "SHA256"]:
              rel.append(f"{algo}:")
              for arch in archs:
                  for fname in [f"main/binary-{arch}/Packages", f"main/binary-{arch}/Packages.gz"]:
                      p = Path(f"gh-pages/dists/termux/{fname}")
                      if not p.exists(): continue
                      data = p.read_bytes()
                      h = hashlib.md5(data).hexdigest() if algo == "MD5Sum" else hashlib.sha256(data).hexdigest()
                      rel.append(f" {h} {len(data)} {fname}")
          Path("gh-pages/dists/termux/Release").write_text("\n".join(rel) + "\n")
          print("Release file generated")
          EOF

      - name: Commit and push
        run: |
          cd gh-pages
          git config user.email "258516621+termux-app-store@users.noreply.github.com"
          git config user.name "Termux App Store"
          git add -A
          COUNT=$(ls pool/main/*.deb 2>/dev/null | wc -l || echo 0)
          MSG="pkg: update pool — ${COUNT} .deb files [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git diff --staged --quiet && echo "Nothing to commit" || \
            (git commit -m "$MSG" && git push origin HEAD:gh-pages && echo "Pushed: $MSG")

      - name: Summary
        run: |
          COUNT=$(ls gh-pages/pool/main/*.deb 2>/dev/null | wc -l || echo 0)
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**$COUNT** .deb files in pool" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Built natively inside **termux-docker aarch64** — binaries compatible with Termux on Android." >> $GITHUB_STEP_SUMMARY
