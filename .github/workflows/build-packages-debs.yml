name: Build Package .deb Files

permissions:
  contents: write

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package spesifik (kosong = semua yang berubah)'
        required: false
        default: ''
      force:
        description: 'Force rebuild (ignore cache)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  detect-changes:
    name: Detect Packages to Build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_packages: ${{ steps.detect.outputs.has_packages }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 2

      - name: Detect packages to build
        id: detect
        run: |
          SPECIFIC="${{ github.event.inputs.package }}"
          FORCE="${{ github.event.inputs.force }}"
          TRIGGER="${{ github.event_name }}"

          if [[ -n "$SPECIFIC" ]]; then
            [[ -f "packages/$SPECIFIC/build.sh" ]] || { echo "Package '$SPECIFIC' not found"; exit 1; }
            PKGS="$SPECIFIC"
          elif [[ "$FORCE" == "true" || "$TRIGGER" == "schedule" ]]; then
            PKGS=$(ls packages/ 2>/dev/null | tr '\n' ' ')
          else
            PKGS=$(python3 -c "
          import json, subprocess
          try:
              old = {p['package']:p.get('version','') for p in json.loads(
                  subprocess.check_output(['git','show','HEAD~1:tools/index.json'],
                  stderr=subprocess.DEVNULL).decode()).get('packages',[])}
          except:
              old = {}
          new = {p['package']:p.get('version','') for p in json.load(open('tools/index.json')).get('packages',[])}
          print(' '.join(pkg for pkg,ver in new.items() if old.get(pkg,'') != ver))
          " 2>/dev/null || echo "")
          fi

          if [[ -z "$(echo $PKGS | tr -d ' ')" ]]; then
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATRIX_ITEMS=""
          for pkg in $PKGS; do
            [[ -f "packages/$pkg/build.sh" ]] || continue
            VERSION=$(grep 'TERMUX_PKG_VERSION=' "packages/$pkg/build.sh" \
              | head -1 | cut -d= -f2 | tr -d "\"'" 2>/dev/null || echo "unknown")
            SHA256=$(grep 'TERMUX_PKG_SHA256=' "packages/$pkg/build.sh" \
              | head -1 | cut -d= -f2 | tr -d "\"'" 2>/dev/null | cut -c1-16 || echo "")
            [[ -n "$MATRIX_ITEMS" ]] && MATRIX_ITEMS="$MATRIX_ITEMS,"
            MATRIX_ITEMS="${MATRIX_ITEMS}{\"package\":\"$pkg\",\"version\":\"$VERSION\",\"sha256\":\"$SHA256\"}"
          done

          echo "matrix={\"include\":[$MATRIX_ITEMS]}" >> "$GITHUB_OUTPUT"
          echo "has_packages=true" >> "$GITHUB_OUTPUT"
          echo "Packages to build: $PKGS"

  build-deb:
    name: Build ${{ matrix.package }} v${{ matrix.version }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_packages == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check binary cache
        id: cache
        if: github.event.inputs.force != 'true'
        uses: actions/cache@v5
        with:
          path: output/
          key: pkg-${{ matrix.package }}-${{ matrix.version }}-${{ matrix.sha256 }}
          restore-keys: |
            pkg-${{ matrix.package }}-${{ matrix.version }}-
            pkg-${{ matrix.package }}-

      - name: Set up QEMU
        if: github.event.inputs.force == 'true' || steps.cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build .deb di aarch64 via QEMU
        if: github.event.inputs.force == 'true' || steps.cache.outputs.cache-hit != 'true'
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${PWD}:/repo"
          install: |
            set -e

            apt-get update -qq

            apt-get install -y -qq git

            git config --global --add safe.directory /repo
            git config --global --add safe.directory '*'

            apt-get install -y -qq \
              dpkg-dev curl file python3 python3-pip python3-setuptools \
              build-essential cmake wget sudo pkg-config \
              nodejs npm \
              perl lua5.4 php-cli \
              patchelf \
              autoconf automake libtool \
              zlib1g-dev libssl-dev libffi-dev \
              libfontconfig1-dev libfreetype-dev \
              libglib2.0-dev libxml2-dev libxslt1-dev \
              unzip tar gzip jq \
              bash coreutils findutils

            curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
            . /root/.cargo/env

            GO_VER=$(curl -sSf https://go.dev/VERSION?m=text | head -1)
            curl -sSfL "https://go.dev/dl/${GO_VER}.linux-arm64.tar.gz" | tar -C /usr/local -xz
            ln -sf /usr/local/go/bin/go /usr/local/bin/go
            ln -sf /usr/local/go/bin/gofmt /usr/local/bin/gofmt

          run: |
            set -e
            . /root/.cargo/env 2>/dev/null || true
            export PATH=$PATH:/usr/local/go/bin:/root/.cargo/bin

            git config --global --add safe.directory /repo
            git config --global --add safe.directory '*'

            cd /repo
            PKG="${{ matrix.package }}"
            mkdir -p output

            echo "============================================"
            echo "  Building: $PKG"
            echo "============================================"

            BUILD_SH="packages/$PKG/build.sh"
            source "$BUILD_SH"

            TERMUX_PREFIX="/data/data/com.termux/files/usr"
            TERMUX_HOME="/data/data/com.termux/files/home"
            mkdir -p \
              "$TERMUX_PREFIX/bin" \
              "$TERMUX_PREFIX/lib" \
              "$TERMUX_PREFIX/lib/python3/dist-packages" \
              "$TERMUX_PREFIX/lib/node_modules" \
              "$TERMUX_PREFIX/include" \
              "$TERMUX_PREFIX/share/doc" \
              "$TERMUX_PREFIX/share/man/man1" \
              "$TERMUX_PREFIX/share/licenses" \
              "$TERMUX_PREFIX/etc" \
              "$TERMUX_PREFIX/tmp" \
              "$TERMUX_PREFIX/var/lib" \
              "$TERMUX_HOME"

            for tool in bash sh python3 python perl node npm go cargo curl wget git dpkg dpkg-deb; do
              BIN=$(command -v $tool 2>/dev/null || true)
              [[ -n "$BIN" && ! -e "$TERMUX_PREFIX/bin/$tool" ]] && \
                ln -sf "$BIN" "$TERMUX_PREFIX/bin/$tool" || true
            done
            [[ ! -e "$TERMUX_PREFIX/bin/python" ]] && \
              ln -sf "$(command -v python3)" "$TERMUX_PREFIX/bin/python" || true

            export TERMUX_PKG_TMPDIR="/tmp/termux-build/$PKG"
            export TERMUX_PKG_BUILDDIR="$TERMUX_PKG_TMPDIR/build"
            export TERMUX_PKG_SRCDIR="$TERMUX_PKG_TMPDIR/src"
            export TERMUX_PKG_CACHEDIR="/tmp/termux-cache"
            export TERMUX_ARCH="aarch64"
            export TERMUX_HOST_PLATFORM="aarch64-linux-android"
            export HOME="$TERMUX_HOME"

            mkdir -p "$TERMUX_PKG_TMPDIR" "$TERMUX_PKG_BUILDDIR" \
                     "$TERMUX_PKG_SRCDIR" "$TERMUX_PKG_CACHEDIR" \
                     "$TERMUX_PKG_TMPDIR/extract"

            SRCURL="${TERMUX_PKG_SRCURL:-}"
            IS_PREBUILT_DEB=false
            IS_PLATFORM_INDEPENDENT="${TERMUX_PKG_PLATFORM_INDEPENDENT:-false}"
            [[ "$SRCURL" == *.deb ]] && IS_PREBUILT_DEB=true

            echo "  Type    : $(${IS_PREBUILT_DEB} && echo 'pre-built .deb' || echo 'compile from source')"
            echo "  Version : ${TERMUX_PKG_VERSION:-unknown}"
            echo "  Indep   : $IS_PLATFORM_INDEPENDENT"

            if [[ -n "$SRCURL" ]]; then
              EXT="${SRCURL##*.}"
              ARCHIVE="$TERMUX_PKG_CACHEDIR/source.$EXT"

              if [[ ! -f "$ARCHIVE" ]]; then
                echo "  Downloading: $SRCURL"
                curl -fsSL --retry 3 --retry-delay 5 -o "$ARCHIVE" "$SRCURL" || {
                  echo "FATAL: Download failed"
                  exit 1
                }
              fi

              # Verifikasi SHA256
              if [[ -n "${TERMUX_PKG_SHA256:-}" ]]; then
                ACTUAL=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)
                if [[ "$ACTUAL" != "$TERMUX_PKG_SHA256" ]]; then
                  echo "FATAL: SHA256 mismatch"
                  echo "  Expected: $TERMUX_PKG_SHA256"
                  echo "  Actual  : $ACTUAL"
                  exit 1
                fi
                echo "  SHA256 OK"
              fi

              # Extract
              if [[ "$IS_PREBUILT_DEB" == "true" ]]; then
                echo "  Pre-built .deb detected, repackaging..."
                dpkg-deb -R "$ARCHIVE" "$TERMUX_PKG_SRCDIR"
              else
                case "$EXT" in
                  zip)
                    unzip -q "$ARCHIVE" -d "$TERMUX_PKG_TMPDIR/extract"
                    INNER=$(ls "$TERMUX_PKG_TMPDIR/extract/" | head -1)
                    if [[ -n "$INNER" && -d "$TERMUX_PKG_TMPDIR/extract/$INNER" ]]; then
                      mv "$TERMUX_PKG_TMPDIR/extract/$INNER"/* "$TERMUX_PKG_SRCDIR/" 2>/dev/null || \
                        mv "$TERMUX_PKG_TMPDIR/extract/$INNER" "$TERMUX_PKG_SRCDIR"
                    else
                      cp -r "$TERMUX_PKG_TMPDIR/extract/." "$TERMUX_PKG_SRCDIR/" 2>/dev/null || true
                    fi
                    ;;
                  gz|tgz|bz2|xz)
                    tar -xf "$ARCHIVE" -C "$TERMUX_PKG_TMPDIR/extract" 2>/dev/null || true
                    # Strip top-level directory jika ada
                    INNER=$(ls "$TERMUX_PKG_TMPDIR/extract/" 2>/dev/null | head -1)
                    if [[ -n "$INNER" && -d "$TERMUX_PKG_TMPDIR/extract/$INNER" ]]; then
                      cp -r "$TERMUX_PKG_TMPDIR/extract/$INNER/." "$TERMUX_PKG_SRCDIR/"
                    else
                      cp -r "$TERMUX_PKG_TMPDIR/extract/." "$TERMUX_PKG_SRCDIR/" 2>/dev/null || true
                    fi
                    ;;
                  *)
                    cp "$ARCHIVE" "$TERMUX_PKG_SRCDIR/"
                    ;;
                esac
              fi
            fi

            TIMESTAMP_FILE=$(mktemp)

            if [[ "$IS_PREBUILT_DEB" == "true" ]]; then
              # Repackage pre-built .deb
              PKG_DIR="$TERMUX_PKG_BUILDDIR/pkg"
              mkdir -p "$PKG_DIR/DEBIAN"
              find "$TERMUX_PKG_SRCDIR" -mindepth 1 -maxdepth 1 \
                ! -name 'DEBIAN' -exec cp -r {} "$PKG_DIR/" \;

              INSTALLED_SIZE=$(du -sk "$PKG_DIR" | cut -f1)
              printf 'Package: %s\nVersion: %s\nArchitecture: all\nMaintainer: %s\nInstalled-Size: %s\n' \
                "$PKG" "${TERMUX_PKG_VERSION:-1.0.0}" \
                "${TERMUX_PKG_MAINTAINER:-@termux-app-store}" \
                "$INSTALLED_SIZE" > "$PKG_DIR/DEBIAN/control"
              [[ -n "${TERMUX_PKG_DEPENDS:-}" ]] && \
                printf 'Depends: %s\n' "$TERMUX_PKG_DEPENDS" >> "$PKG_DIR/DEBIAN/control"
              [[ -n "${TERMUX_PKG_HOMEPAGE:-}" ]] && \
                printf 'Homepage: %s\n' "$TERMUX_PKG_HOMEPAGE" >> "$PKG_DIR/DEBIAN/control"
              printf 'Description: %s\n' "${TERMUX_PKG_DESCRIPTION:-$PKG package}" \
                >> "$PKG_DIR/DEBIAN/control"

              dpkg-deb --build "$PKG_DIR" \
                "/repo/output/${PKG}_${TERMUX_PKG_VERSION:-1.0.0}_all.deb"

            elif declare -f termux_step_make_install > /dev/null; then
              BUILD_IN_SRC="${TERMUX_PKG_BUILD_IN_SRC:-false}"

              if [[ "$BUILD_IN_SRC" == "true" ]]; then
                cd "$TERMUX_PKG_SRCDIR"
              else
                cd "$TERMUX_PKG_BUILDDIR"
              fi

              echo "  Running termux_step_make_install()..."
              termux_step_make_install 2>&1

              if [[ "$IS_PLATFORM_INDEPENDENT" == "true" ]]; then
                DEB_ARCH="all"
              else
                DEB_ARCH="aarch64"
              fi

              cd /repo
              PKG_DIR="$TERMUX_PKG_BUILDDIR/deb_root"
              mkdir -p "$PKG_DIR"

              if [[ -d "$TERMUX_PREFIX" ]]; then
                mkdir -p "$PKG_DIR/data/data/com.termux/files"
                cp -rp "$TERMUX_PREFIX" "$PKG_DIR/data/data/com.termux/files/usr"
              fi

              mkdir -p "$PKG_DIR/DEBIAN"
              INSTALLED_SIZE=$(du -sk "$PKG_DIR" | cut -f1)

              printf 'Package: %s\nVersion: %s\nArchitecture: %s\nMaintainer: %s\nInstalled-Size: %s\n' \
                "$PKG" "${TERMUX_PKG_VERSION:-1.0.0}" "$DEB_ARCH" \
                "${TERMUX_PKG_MAINTAINER:-@termux-app-store}" \
                "$INSTALLED_SIZE" > "$PKG_DIR/DEBIAN/control"
              [[ -n "${TERMUX_PKG_DEPENDS:-}" ]] && \
                printf 'Depends: %s\n' "$TERMUX_PKG_DEPENDS" >> "$PKG_DIR/DEBIAN/control"
              [[ -n "${TERMUX_PKG_HOMEPAGE:-}" ]] && \
                printf 'Homepage: %s\n' "$TERMUX_PKG_HOMEPAGE" >> "$PKG_DIR/DEBIAN/control"
              printf 'Description: %s\n' "${TERMUX_PKG_DESCRIPTION:-$PKG package}" \
                >> "$PKG_DIR/DEBIAN/control"

              dpkg-deb --build "$PKG_DIR" \
                "/repo/output/${PKG}_${TERMUX_PKG_VERSION:-1.0.0}_${DEB_ARCH}.deb"
            else
              echo "FATAL: Tidak ada termux_step_make_install() dan bukan pre-built .deb"
              exit 1
            fi

            rm -f "$TIMESTAMP_FILE"

            cd /repo
            BUILT=$(ls output/${PKG}_*.deb 2>/dev/null | head -1)
            if [[ -z "$BUILT" ]]; then
              echo "FATAL: Tidak ada .deb yang dihasilkan"
              exit 1
            fi

            echo ""
            echo "── Build Result ─────────────────────────"
            dpkg-deb -I "$BUILT"
            echo "  File : $(basename $BUILT)"
            echo "  Size : $(du -sh "$BUILT" | cut -f1)"
            echo "─────────────────────────────────────────"

            cd output
            for f in *.deb; do
              sha256sum "$f" > "${f}.sha256"
            done
            cd ..
            chmod -R 777 output/

      - name: Generate SHA256 checksums
        run: |
          mkdir -p output
          cd output
          shopt -s nullglob
          debs=(*.deb)
          if [[ ${#debs[@]} -eq 0 ]]; then
            echo "No .deb files (build skipped or failed)"
            exit 0
          fi
          for f in "${debs[@]}"; do
            [[ -f "${f}.sha256" ]] || sha256sum "$f" > "${f}.sha256"
            echo "OK: ${f}.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: deb-${{ matrix.package }}-${{ matrix.version }}
          path: |
            output/*.deb
            output/*.sha256
          retention-days: 7
          if-no-files-found: warn

  publish:
    name: Publish .deb to gh-pages
    runs-on: ubuntu-latest
    needs: [detect-changes, build-deb]
    if: |
      always() &&
      needs.detect-changes.outputs.has_packages == 'true' &&
      needs.build-deb.result != 'cancelled'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install tools
        run: sudo apt-get install -y -qq dpkg-dev python3

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: deb-*
          path: all-debs/
          merge-multiple: true

      - name: Checkout gh-pages
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Initialize gh-pages if missing
        run: |
          if [[ ! -d "gh-pages/.git" ]]; then
            mkdir -p gh-pages && cd gh-pages
            git init
            git remote add origin \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git checkout --orphan gh-pages
          fi
          mkdir -p gh-pages/pool/main
          for arch in aarch64 arm x86_64 i686 all; do
            mkdir -p "gh-pages/dists/termux/main/binary-${arch}"
          done

      - name: Purge old .deb (force rebuild only)
        if: github.event.inputs.force == 'true'
        run: |
          SPECIFIC="${{ github.event.inputs.package }}"
          if [[ -n "$SPECIFIC" ]]; then
            rm -f "gh-pages/pool/main/${SPECIFIC}_"*.deb \
                  "gh-pages/pool/main/${SPECIFIC}_"*.sha256
            echo "Removed old .deb for: $SPECIFIC"
          else
            rm -f gh-pages/pool/main/*.deb gh-pages/pool/main/*.sha256
            echo "Removed ALL old .deb files"
          fi

      - name: Update pool (incremental)
        run: |
          ADDED=0
          for deb in all-debs/*.deb; do
            [[ -f "$deb" ]] || continue
            fname=$(basename "$deb")
            PKG=$(echo "$fname"  | sed 's/_[^_]*_[^_]*\.deb$//')
            ARCH=$(echo "$fname" | sed 's/.*_\([^_]*\)\.deb$/\1/')
            for old in "gh-pages/pool/main/${PKG}_"*"_${ARCH}.deb"; do
              [[ -f "$old" && "$(basename $old)" != "$fname" ]] && \
                rm -f "$old" "${old}.sha256" && echo "  Removed: $(basename $old)"
            done
            cp "$deb" "gh-pages/pool/main/"
            [[ -f "${deb}.sha256" ]] && cp "${deb}.sha256" "gh-pages/pool/main/"
            echo "  Added: $fname"
            ADDED=$((ADDED+1))
          done
          echo "Pool: $ADDED added, $(ls gh-pages/pool/main/*.deb 2>/dev/null | wc -l) total"

      - name: Generate Packages index and Release
        run: |
          python3 - <<'EOF'
          import hashlib, subprocess
          from pathlib import Path
          from datetime import datetime, timezone

          pool  = Path("gh-pages/pool/main")
          archs = ["aarch64", "arm", "x86_64", "i686", "all"]

          for arch in archs:
              out_dir = Path(f"gh-pages/dists/termux/main/binary-{arch}")
              out_dir.mkdir(parents=True, exist_ok=True)
              entries = []
              for deb in sorted(pool.glob(f"*_{arch}.deb")):
                  def field(f, d=deb):
                      return subprocess.run(
                          ["dpkg-deb", "-f", str(d), f],
                          capture_output=True, text=True
                      ).stdout.strip()
                  data = deb.read_bytes()
                  lines = [
                      f"Package: {field('Package')}",
                      f"Version: {field('Version')}",
                      f"Architecture: {field('Architecture')}",
                      f"Maintainer: {field('Maintainer')}",
                      f"Installed-Size: {field('Installed-Size')}",
                  ]
                  dep  = field("Depends")
                  home = field("Homepage")
                  if dep:  lines.append(f"Depends: {dep}")
                  if home: lines.append(f"Homepage: {home}")
                  lines += [
                      f"Filename: {deb.relative_to('gh-pages')}",
                      f"Size: {len(data)}",
                      f"MD5sum: {hashlib.md5(data).hexdigest()}",
                      f"SHA1: {hashlib.sha1(data).hexdigest()}",
                      f"SHA256: {hashlib.sha256(data).hexdigest()}",
                      f"Description: {field('Description')}",
                      "",
                  ]
                  entries.append("\n".join(lines))
              pkg_file = out_dir / "Packages"
              pkg_file.write_text("\n".join(entries))
              gz = out_dir / "Packages.gz"
              gz.unlink(missing_ok=True)
              subprocess.run(["gzip", "-k", str(pkg_file)])
              print(f"  [{arch}] {len(entries)} packages")

          date_str = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S UTC")
          rel_lines = [
              "Origin: Termux App Store", "Label: Termux App Store",
              "Suite: termux", "Codename: termux", "Components: main",
              "Architectures: aarch64 arm x86_64 i686 all",
              "Description: Official Termux repository by @djunekz",
              f"Date: {date_str}",
          ]
          for algo in ["MD5Sum", "SHA256"]:
              rel_lines.append(f"{algo}:")
              for arch in archs:
                  for fname in [f"main/binary-{arch}/Packages",
                                 f"main/binary-{arch}/Packages.gz"]:
                      p = Path(f"gh-pages/dists/termux/{fname}")
                      if not p.exists(): continue
                      data = p.read_bytes()
                      h = hashlib.md5(data).hexdigest() if algo == "MD5Sum" \
                          else hashlib.sha256(data).hexdigest()
                      rel_lines.append(f" {h} {len(data)} {fname}")
          Path("gh-pages/dists/termux/Release").write_text("\n".join(rel_lines) + "\n")
          print("Release file generated")
          EOF

      - name: Update index.json with .deb SHA256 hashes
        run: |
          mkdir -p gh-pages/tools
          cp tools/index.json gh-pages/tools/index.json
          python3 - <<'EOF'
          import json, hashlib
          from pathlib import Path

          index_path = Path("gh-pages/tools/index.json")
          pool_dir   = Path("gh-pages/pool/main")

          with open(index_path) as f:
              data = json.load(f)

          updated = 0
          for pkg in data.get("packages", []):
              name = pkg.get("package", "")
              ver  = pkg.get("version", "")
              debs = sorted(pool_dir.glob(f"{name}_{ver}_*.deb"))
              if not debs:
                  debs = sorted(pool_dir.glob(f"{name}_*.deb"))
              if not debs:
                  continue
              arch_hashes = {}
              for deb in debs:
                  arch = deb.stem.rsplit("_", 1)[-1]
                  arch_hashes[arch] = hashlib.sha256(deb.read_bytes()).hexdigest()
              if not arch_hashes:
                  continue
              primary = arch_hashes.get("aarch64") \
                     or arch_hashes.get("all") \
                     or next(iter(arch_hashes.values()))
              pkg["sha256"] = primary
              pkg["sha256_by_arch"] = arch_hashes
              updated += 1

          with open(index_path, "w") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          print(f"Updated SHA256 for {updated} package(s)")
          EOF

      - name: Commit and push
        run: |
          cd gh-pages
          git config user.email "258516621+termux-app-store@users.noreply.github.com"
          git config user.name "Termux App Store"
          git add -A
          COUNT=$(ls pool/main/*.deb 2>/dev/null | wc -l || echo 0)
          MSG="pkg: update pool — ${COUNT} .deb files [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git diff --staged --quiet && echo "Nothing to commit" || \
            (git commit -m "$MSG" && git push origin HEAD:gh-pages && echo "Pushed: $MSG")

      - name: Summary
        run: |
          COUNT=$(ls gh-pages/pool/main/*.deb 2>/dev/null | wc -l || echo 0)
          echo "## Summary" >> $GITHUB_STEP_SUMMARY
          echo "**$COUNT** .deb files in pool" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pool Contents" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls gh-pages/pool/main/*.deb 2>/dev/null | xargs -I{} basename {} | sort \
            >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
