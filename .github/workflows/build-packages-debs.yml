name: Build Package .deb Files

permissions:
  contents: write

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild (ignore cache)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  detect-packages:
    name: Detect All Packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      count: ${{ steps.detect.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - name: Scan packages/
        id: detect
        run: |
          declare -a PACKAGES
          
          for pkg_dir in packages/*/; do
            [[ ! -f "$pkg_dir/build.sh" ]] && continue
            PKG_NAME=$(basename "$pkg_dir")
            PACKAGES+=("$PKG_NAME")
          done
          
          COUNT=${#PACKAGES[@]}
          
          if [[ $COUNT -eq 0 ]]; then
            echo "packages=[]" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Build JSON array manually
          JSON='['
          for i in "${!PACKAGES[@]}"; do
            [[ $i -gt 0 ]] && JSON="$JSON,"
            JSON="$JSON\"${PACKAGES[$i]}\""
          done
          JSON="$JSON]"
          
          echo "packages=$JSON" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "✓ Found $COUNT packages"

  build-debs:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: detect-packages
    if: needs.detect-packages.outputs.count > 0
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-packages.outputs.packages) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            dpkg-dev curl file python3 python3-pip python3-setuptools \
            build-essential cmake git wget sudo pkg-config nodejs npm \
            perl lua5.4 php-cli patchelf autoconf automake libtool \
            zlib1g-dev libssl-dev libffi-dev libfontconfig1-dev libfreetype-dev \
            libglib2.0-dev libxml2-dev libxslt1-dev unzip tar gzip

      - name: Install Rust
        run: |
          curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Go
        run: |
          GO_VER=$(curl -sSf https://go.dev/VERSION?m=text | head -1)
          curl -sSfL "https://go.dev/dl/${GO_VER}.linux-x86_64.tar.gz" | sudo tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Get package version
        id: meta
        run: |
          BUILD_SH="packages/${{ matrix.package }}/build.sh"
          VERSION=$(grep 'TERMUX_PKG_VERSION=' "$BUILD_SH" | head -1 | cut -d= -f2 | tr -d "\"'" | head -c 20)
          echo "version=${VERSION:-0.0.0}" >> $GITHUB_OUTPUT

      - name: Check cache
        id: cache
        if: github.event.inputs.force != 'true'
        uses: actions/cache@v4
        with:
          path: output/
          key: pkg-${{ matrix.package }}-${{ steps.meta.outputs.version }}
          restore-keys: pkg-${{ matrix.package }}-

      - name: Build package
        if: github.event.inputs.force == 'true' || steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p output logs
          bash ./build-package.sh "${{ matrix.package }}" 2>&1 | tee "logs/${{ matrix.package }}.log"

      - name: Generate checksums
        if: always()
        run: |
          mkdir -p output
          cd output
          for deb in *.deb; do
            [[ -f "$deb" ]] && sha256sum "$deb" > "${deb}.sha256"
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.package }}
          path: |
            output/
            logs/
          retention-days: 7
          if-no-files-found: warn

  publish:
    name: Publish to gh-pages
    runs-on: ubuntu-latest
    needs: build-debs
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare pool
        run: |
          mkdir -p pool/main
          find artifacts -type f \( -name "*.deb" -o -name "*.sha256" \) -exec cp {} pool/main/ \;
          echo "✓ Collected $(ls pool/main/*.deb 2>/dev/null | wc -l) packages"

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Setup repo structure
        run: |
          mkdir -p gh-pages/pool/main
          mkdir -p gh-pages/dists/termux/main/binary-{aarch64,arm,x86_64,i686,all}

      - name: Update pool
        run: cp pool/main/*.{deb,sha256} gh-pages/pool/main/ 2>/dev/null || true

      - name: Generate index
        run: |
          python3 << 'PYTHON'
          import subprocess, hashlib
          from pathlib import Path
          from datetime import datetime, timezone
          
          pool = Path("gh-pages/pool/main")
          for arch in ["aarch64", "arm", "x86_64", "i686", "all"]:
              out = Path(f"gh-pages/dists/termux/main/binary-{arch}")
              out.mkdir(parents=True, exist_ok=True)
              entries = []
              for deb in sorted(pool.glob(f"*_{arch}.deb")):
                  try:
                      data = deb.read_bytes()
                      r = subprocess.run(["dpkg-deb", "-f", str(deb)], capture_output=True, text=True, timeout=5)
                      entries.append(f"{r.stdout.strip()}\nFilename: pool/main/{deb.name}\nSize: {len(data)}\nSHA256: {hashlib.sha256(data).hexdigest()}\n")
                  except: pass
              (out / "Packages").write_text("\n".join(entries))
              subprocess.run(["gzip", "-kf", str(out / "Packages")], check=False)
              print(f"✓ [{arch}] {len(entries)}")
          
          release = f"Origin: Termux App Store\nLabel: Termux App Store\nSuite: termux\nCodename: termux\nComponents: main\nArchitectures: aarch64 arm x86_64 i686 all\nDate: {datetime.now(timezone.utc).strftime('%a, %d %b %Y %H:%M:%S UTC')}\n"
          Path("gh-pages/dists/termux/Release").write_text(release)
          print("✓ Release generated")
          PYTHON

      - name: Push gh-pages
        run: |
          cd gh-pages
          git config user.email "258516621+termux-app-store@users.noreply.github.com"
          git config user.name "Termux App Store"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "build: update .deb pool"
            git push origin HEAD:gh-pages
          fi
