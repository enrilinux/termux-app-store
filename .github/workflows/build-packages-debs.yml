name: Build Package .deb Files

permissions:
  contents: write

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package spesifik (kosong = build semua yang berubah)'
        required: false
        default: ''
      force:
        description: 'Force rebuild (ignore cache)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  detect-changes:
    name: Detect Packages to Build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_packages: ${{ steps.detect.outputs.has_packages }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 2

      - name: Detect packages to build
        id: detect
        run: |
          SPECIFIC="${{ github.event.inputs.package }}"
          FORCE="${{ github.event.inputs.force }}"
          TRIGGER="${{ github.event_name }}"

          if [[ -n "$SPECIFIC" ]]; then
            [[ -f "packages/$SPECIFIC/build.sh" ]] || { echo "Package '$SPECIFIC' not found"; exit 1; }
            PKGS="$SPECIFIC"
          elif [[ "$FORCE" == "true" || "$TRIGGER" == "schedule" ]]; then
            PKGS=$(ls packages/ 2>/dev/null | tr '\n' ' ')
          else
            PKGS=$(python3 -c "
          import json, subprocess
          try:
              old = {p['package']:p.get('version','') for p in json.loads(subprocess.check_output(['git','show','HEAD~1:tools/index.json'],stderr=subprocess.DEVNULL).decode()).get('packages',[])}
          except:
              old = {}
          new = {p['package']:p.get('version','') for p in json.load(open('tools/index.json')).get('packages',[])}
          print(' '.join(pkg for pkg,ver in new.items() if old.get(pkg,'') != ver))
          " 2>/dev/null || echo "")
          fi

          if [[ -z "$(echo $PKGS | tr -d ' ')" ]]; then
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATRIX_ITEMS=""
          for pkg in $PKGS; do
            [[ -f "packages/$pkg/build.sh" ]] || continue
            VERSION=$(grep 'TERMUX_PKG_VERSION=' "packages/$pkg/build.sh" | head -1 | cut -d= -f2 | tr -d "\"'" 2>/dev/null || echo "unknown")
            SHA256=$(grep 'TERMUX_PKG_SHA256=' "packages/$pkg/build.sh" | head -1 | cut -d= -f2 | tr -d "\"'" 2>/dev/null | cut -c1-16 || echo "")
            [[ -n "$MATRIX_ITEMS" ]] && MATRIX_ITEMS="$MATRIX_ITEMS,"
            MATRIX_ITEMS="${MATRIX_ITEMS}{\"package\":\"$pkg\",\"version\":\"$VERSION\",\"sha256\":\"$SHA256\"}"
          done

          echo "matrix={\"include\":[$MATRIX_ITEMS]}" >> "$GITHUB_OUTPUT"
          echo "has_packages=true" >> "$GITHUB_OUTPUT"

  build-deb:
    name: Build ${{ matrix.package }} v${{ matrix.version }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_packages == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install build tools
        run: sudo apt-get install -y -qq dpkg-dev curl

      - name: Check binary cache
        id: cache
        if: github.event.inputs.force != 'true'
        uses: actions/cache@v5
        with:
          path: output/
          key: pkg-${{ matrix.package }}-${{ matrix.version }}-${{ matrix.sha256 }}
          restore-keys: |
            pkg-${{ matrix.package }}-${{ matrix.version }}-
            pkg-${{ matrix.package }}-

      - name: Build .deb for all architectures
        if: github.event.inputs.force == 'true' || steps.cache.outputs.cache-hit != 'true'
        run: |
          PKG="${{ matrix.package }}"
          BUILD_SH="packages/$PKG/build.sh"

          VERSION=$(grep 'TERMUX_PKG_VERSION='     "$BUILD_SH" | head -1 | cut -d= -f2 | tr -d "\"'")
          DESC=$(grep    'TERMUX_PKG_DESCRIPTION=' "$BUILD_SH" | head -1 | cut -d= -f2 | tr -d "\"'")
          HOMEPAGE=$(grep 'TERMUX_PKG_HOMEPAGE='   "$BUILD_SH" | head -1 | cut -d= -f2 | tr -d "\"'")
          DEPENDS=$(grep  'TERMUX_PKG_DEPENDS='    "$BUILD_SH" | head -1 | cut -d= -f2 | tr -d "\"'" || echo "")
          LICENSE=$(grep  'TERMUX_PKG_LICENSE='    "$BUILD_SH" | head -1 | cut -d= -f2 | tr -d "\"'" || echo "")
          SHA256=$(grep   'TERMUX_PKG_SHA256='     "$BUILD_SH" | head -1 | cut -d= -f2 | tr -d "\"'" || echo "")
          SRC_URL_RAW=$(grep 'TERMUX_PKG_SRCURL='  "$BUILD_SH" | head -1 | cut -d= -f2- | tr -d "\"'" || echo "")
          SRC_URL="${SRC_URL_RAW//\$\{TERMUX_PKG_VERSION\}/$VERSION}"
          SRC_URL="${SRC_URL//\$TERMUX_PKG_VERSION/$VERSION}"

          echo "Package: $PKG | Version: $VERSION | URL: $SRC_URL"
          mkdir -p output

          IS_PREBUILT_DEB=0
          echo "$SRC_URL" | grep -qE '\.deb($|\?)' && IS_PREBUILT_DEB=1

          if [[ "$IS_PREBUILT_DEB" -eq 1 ]]; then
            echo "Type: pre-built .deb from developer"
            curl -fsSL --retry 3 "$SRC_URL" -o "/tmp/${PKG}-orig.deb" || { echo "Download failed"; exit 1; }

            [[ -n "$SHA256" ]] && ACTUAL=$(sha256sum "/tmp/${PKG}-orig.deb" | cut -d' ' -f1) && \
              [[ "$ACTUAL" == "$SHA256" ]] && echo "SHA256 OK" || echo "SHA256 mismatch (expected=$SHA256 got=$ACTUAL)"

            ORIG_DEPENDS=$(dpkg-deb -f "/tmp/${PKG}-orig.deb" Depends 2>/dev/null || echo "$DEPENDS")
            ORIG_ISIZE=$(dpkg-deb -f "/tmp/${PKG}-orig.deb" Installed-Size 2>/dev/null || echo "0")

            for ARCH in aarch64 arm x86_64 i686; do
              PKG_BUILD="build_tmp/${PKG}_${ARCH}"
              mkdir -p "$PKG_BUILD"
              dpkg-deb -x "/tmp/${PKG}-orig.deb" "$PKG_BUILD/" || { echo "Extract failed $ARCH"; continue; }
              mkdir -p "$PKG_BUILD/DEBIAN"
              printf 'Package: %s\nVersion: %s\nArchitecture: %s\nMaintainer: djunekz <gab288.gab288@passinbox.com>\nInstalled-Size: %s\n' \
                "$PKG" "$VERSION" "$ARCH" "${ORIG_ISIZE:-0}" > "$PKG_BUILD/DEBIAN/control"
              [[ -n "${ORIG_DEPENDS:-$DEPENDS}" ]] && echo "Depends: ${ORIG_DEPENDS:-$DEPENDS}" >> "$PKG_BUILD/DEBIAN/control"
              [[ -n "$HOMEPAGE" ]] && echo "Homepage: $HOMEPAGE" >> "$PKG_BUILD/DEBIAN/control"
              echo "Description: ${DESC:-Termux App Store package}" >> "$PKG_BUILD/DEBIAN/control"
              dpkg-deb --build "$PKG_BUILD" "output/${PKG}_${VERSION}_${ARCH}.deb" && \
                echo "  OK: ${PKG}_${VERSION}_${ARCH}.deb" || echo "  FAIL: $ARCH"
            done

          else
            echo "Type: source package"
            if [[ -f "build-package.sh" ]]; then
              bash build-package.sh "$PKG" 2>&1 || true
            fi

            EXISTING=$(ls output/${PKG}_*.deb 2>/dev/null | head -1 || true)
            if [[ -n "$EXISTING" ]]; then
              echo "OK: $EXISTING"
            else
              SRC_FILE=""
              SRC_DIR=""
              if [[ -n "$SRC_URL" && "$SRC_URL" =~ ^https?:// ]]; then
                curl -fsSL --retry 3 -L "$SRC_URL" -o "/tmp/${PKG}-src" 2>/dev/null || true
                [[ -f "/tmp/${PKG}-src" && -s "/tmp/${PKG}-src" ]] && SRC_FILE="/tmp/${PKG}-src"
              fi

              # Cek apakah build.sh punya termux_step_make_install
              HAS_MAKE_INSTALL=0
              grep -q 'termux_step_make_install' "$BUILD_SH" 2>/dev/null && HAS_MAKE_INSTALL=1

              # Deteksi apakah package butuh kompilasi — tidak bisa di GitHub Actions runner
              # karena perlu cross-compile toolchain untuk aarch64-android
              NEEDS_COMPILE=0
              grep -qE 'cargo (install|build)|make\b|cmake\b|\./configure|gcc|g\+\+|rustc|go build|meson\b|ninja\b' \
                "$BUILD_SH" 2>/dev/null && NEEDS_COMPILE=1

              if [[ "$HAS_MAKE_INSTALL" -eq 1 && "$NEEDS_COMPILE" -eq 1 ]]; then
                echo "⚠ '$PKG' butuh kompilasi (cargo/make/cmake/go) — skip build di GitHub Actions"
                echo "  Package ini akan build dari source langsung di device via build-package.sh"
                exit 0
              fi

              # Deteksi tipe source
              SRC_TYPE="unknown"
              if [[ -n "$SRC_FILE" ]]; then
                FILE_INFO=$(file -b "$SRC_FILE" 2>/dev/null || echo "")
                echo "$FILE_INFO" | grep -qi "^ELF"                          && SRC_TYPE="elf"
                echo "$FILE_INFO" | grep -qi "gzip\|tar\|bzip2\|xz\|zstd"   && SRC_TYPE="archive"
                echo "$FILE_INFO" | grep -qi "Zip archive"                   && SRC_TYPE="archive"
                [[ "$SRC_TYPE" == "unknown" ]] && SRC_TYPE="script"
              fi

              # Extract tarball sekali ke /tmp/src-extract kalau perlu
              EXTRACT_DIR=""
              if [[ "$SRC_TYPE" == "archive" ]]; then
                EXTRACT_DIR="/tmp/${PKG}-extract"
                mkdir -p "$EXTRACT_DIR"
                tar -xf "$SRC_FILE" -C "$EXTRACT_DIR" --strip-components=1 2>/dev/null || \
                  unzip -q "$SRC_FILE" -d "$EXTRACT_DIR" 2>/dev/null || true
                echo "  Extracted to: $EXTRACT_DIR"
                ls "$EXTRACT_DIR" | head -5
              fi

              for ARCH in aarch64 arm x86_64 i686; do
                PKG_BUILD="build_tmp/${PKG}_${ARCH}"
                DESTDIR="$PKG_BUILD/data/data/com.termux/files/usr"
                mkdir -p "$PKG_BUILD/DEBIAN" "$DESTDIR/bin" "$DESTDIR/lib/$PKG"
                ISIZE=0

                if [[ "$SRC_TYPE" == "archive" && "$HAS_MAKE_INSTALL" -eq 1 && -d "$EXTRACT_DIR" ]]; then
                  # Source tarball dengan termux_step_make_install — jalankan fungsinya
                  # dengan TERMUX_PREFIX diarahkan ke DESTDIR
                  (
                    cd "$EXTRACT_DIR"
                    TERMUX_PREFIX="$DESTDIR"
                    TERMUX_PKG_SRCDIR="$EXTRACT_DIR"
                    export TERMUX_PREFIX TERMUX_PKG_SRCDIR
                    # Source fungsi dari build.sh lalu jalankan
                    source "$OLDPWD/$BUILD_SH" 2>/dev/null || true
                    termux_step_make_install 2>&1 || true
                  )
                  ISIZE=$(du -sk "$PKG_BUILD/data" 2>/dev/null | cut -f1 || echo 0)

                elif [[ "$SRC_TYPE" == "elf" ]]; then
                  # ELF binary — cek arch cocok
                  ELF_ARCH=""
                  echo "$FILE_INFO" | grep -qi "aarch64\|ARM aarch64" && ELF_ARCH="aarch64"
                  echo "$FILE_INFO" | grep -qi "ARM," && [[ -z "$ELF_ARCH" ]] && ELF_ARCH="arm"
                  echo "$FILE_INFO" | grep -qi "x86-64" && ELF_ARCH="x86_64"
                  echo "$FILE_INFO" | grep -qi "80386\|i386" && ELF_ARCH="i686"

                  if [[ -z "$ELF_ARCH" || "$ELF_ARCH" == "$ARCH" ]]; then
                    cp "$SRC_FILE" "$DESTDIR/bin/$PKG"
                    chmod +x "$DESTDIR/bin/$PKG"
                    ISIZE=$(du -sk "$PKG_BUILD/data" | cut -f1)
                  else
                    echo "  [!] ELF arch mismatch: file=$ELF_ARCH target=$ARCH — stub only"
                  fi

                elif [[ "$SRC_TYPE" == "script" && -n "$SRC_FILE" ]]; then
                  # Script/Python/binary script — aman semua arch
                  cp "$SRC_FILE" "$DESTDIR/lib/$PKG/"
                  chmod +x "$DESTDIR/lib/$PKG/"* 2>/dev/null || true
                  printf '#!/data/data/com.termux/files/usr/bin/bash\nexec "/data/data/com.termux/files/usr/lib/%s/%s" "$@"\n' \
                    "$PKG" "$(basename $SRC_FILE)" > "$DESTDIR/bin/$PKG"
                  chmod +x "$DESTDIR/bin/$PKG"
                  ISIZE=$(du -sk "$PKG_BUILD/data" | cut -f1)
                fi
                printf 'Package: %s\nVersion: %s\nArchitecture: %s\nMaintainer: djunekz <gab288.gab288@passinbox.com>\nInstalled-Size: %s\n' \
                  "$PKG" "$VERSION" "$ARCH" "$ISIZE" > "$PKG_BUILD/DEBIAN/control"
                [[ -n "$DEPENDS"  ]] && echo "Depends: $DEPENDS"  >> "$PKG_BUILD/DEBIAN/control"
                [[ -n "$HOMEPAGE" ]] && echo "Homepage: $HOMEPAGE" >> "$PKG_BUILD/DEBIAN/control"
                echo "Description: ${DESC:-Termux App Store package}" >> "$PKG_BUILD/DEBIAN/control"
                dpkg-deb --build "$PKG_BUILD" "output/${PKG}_${VERSION}_${ARCH}.deb" && \
                  echo "  OK: $ARCH" || echo "  FAIL: $ARCH"
              done
            fi
          fi

          ls -lh output/ 2>/dev/null || true

      - name: Generate SHA256 checksums
        run: |
          cd output 2>/dev/null || exit 0
          for f in *.deb; do
            [[ -f "$f" ]] && sha256sum "$f" > "${f}.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: deb-${{ matrix.package }}-${{ matrix.version }}
          path: |
            output/*.deb
            output/*.sha256
          retention-days: 7
          if-no-files-found: warn

  publish:
    name: Publish .deb to gh-pages
    runs-on: ubuntu-latest
    needs: [detect-changes, build-deb]
    if: |
      always() &&
      needs.detect-changes.outputs.has_packages == 'true' &&
      needs.build-deb.result != 'cancelled'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install tools
        run: sudo apt-get install -y -qq dpkg-dev python3

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: deb-*
          path: all-debs/
          merge-multiple: true

      - name: Checkout gh-pages
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Initialize gh-pages if missing
        run: |
          if [[ ! -d "gh-pages/.git" ]]; then
            mkdir -p gh-pages && cd gh-pages
            git init
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git checkout --orphan gh-pages
          fi
          mkdir -p gh-pages/pool/main
          for arch in aarch64 arm x86_64 i686; do
            mkdir -p "gh-pages/dists/termux/main/binary-${arch}"
          done

      - name: Purge old .deb files from pool (force rebuild only)
        if: github.event.inputs.force == 'true'
        run: |
          SPECIFIC="${{ github.event.inputs.package }}"
          if [[ -n "$SPECIFIC" ]]; then
            echo "Removing old .deb for: $SPECIFIC"
            rm -f gh-pages/pool/main/${SPECIFIC}_*.deb gh-pages/pool/main/${SPECIFIC}_*.sha256
          else
            echo "Removing ALL old .deb files from pool"
            rm -f gh-pages/pool/main/*.deb gh-pages/pool/main/*.sha256
          fi
          echo "Pool after purge: $(ls gh-pages/pool/main/*.deb 2>/dev/null | wc -l) files"

      - name: Update pool
        run: |
          for deb in all-debs/*.deb; do
            [[ -f "$deb" ]] || continue
            fname=$(basename "$deb")
            PKG=$(echo "$fname"  | sed 's/_[^_]*_[^_]*\.deb$//')
            ARCH=$(echo "$fname" | sed 's/.*_\([^_]*\)\.deb$/\1/')
            for old in "gh-pages/pool/main/${PKG}_"*"_${ARCH}.deb"; do
              [[ -f "$old" && "$(basename $old)" != "$fname" ]] && rm -f "$old" "${old}.sha256" && echo "Removed: $(basename $old)"
            done
            cp "$deb" "gh-pages/pool/main/"
            [[ -f "${deb}.sha256" ]] && cp "${deb}.sha256" "gh-pages/pool/main/"
            echo "Added: $fname"
          done
          echo "Pool total: $(ls gh-pages/pool/main/*.deb 2>/dev/null | wc -l) .deb files"

      - name: Generate Packages index and Release
        run: |
          python3 - <<'EOF'
          import hashlib, subprocess, sys
          from pathlib import Path
          from datetime import datetime, timezone

          pool = Path("gh-pages/pool/main")
          archs = ["aarch64", "arm", "x86_64", "i686"]

          for arch in archs:
              out_dir = Path(f"gh-pages/dists/termux/main/binary-{arch}")
              out_dir.mkdir(parents=True, exist_ok=True)
              entries = []
              for deb in sorted(pool.glob(f"*_{arch}.deb")):
                  def field(f, d=deb):
                      return subprocess.run(["dpkg-deb","-f",str(d),f], capture_output=True, text=True).stdout.strip()
                  data = deb.read_bytes()
                  lines = [
                      f"Package: {field('Package')}",
                      f"Version: {field('Version')}",
                      f"Architecture: {field('Architecture')}",
                      f"Maintainer: {field('Maintainer')}",
                      f"Installed-Size: {field('Installed-Size')}",
                  ]
                  dep = field("Depends")
                  home = field("Homepage")
                  if dep:  lines.append(f"Depends: {dep}")
                  if home: lines.append(f"Homepage: {home}")
                  lines += [
                      f"Filename: {deb.relative_to('gh-pages')}",
                      f"Size: {len(data)}",
                      f"MD5sum: {hashlib.md5(data).hexdigest()}",
                      f"SHA1: {hashlib.sha1(data).hexdigest()}",
                      f"SHA256: {hashlib.sha256(data).hexdigest()}",
                      f"Description: {field('Description')}",
                      "",
                  ]
                  entries.append("\n".join(lines))
              pkg_file = out_dir / "Packages"
              pkg_file.write_text("\n".join(entries))
              gz = out_dir / "Packages.gz"
              gz.unlink(missing_ok=True)
              subprocess.run(["gzip", "-k", str(pkg_file)])
              print(f"  [{arch}] {len(entries)} packages")

          date_str = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S UTC")
          rel_lines = [
              "Origin: Termux App Store", "Label: Termux App Store",
              "Suite: termux", "Codename: termux", "Components: main",
              f"Architectures: {' '.join(archs)}",
              "Description: Official Termux repository by @djunekz",
              f"Date: {date_str}",
          ]
          for algo in ["MD5Sum", "SHA256"]:
              rel_lines.append(f"{algo}:")
              for arch in archs:
                  for fname in [f"main/binary-{arch}/Packages", f"main/binary-{arch}/Packages.gz"]:
                      p = Path(f"gh-pages/dists/termux/{fname}")
                      if not p.exists(): continue
                      data = p.read_bytes()
                      h = hashlib.md5(data).hexdigest() if algo == "MD5Sum" else hashlib.sha256(data).hexdigest()
                      rel_lines.append(f" {h} {len(data)} {fname}")
          Path("gh-pages/dists/termux/Release").write_text("\n".join(rel_lines) + "\n")
          print("Release file generated")
          EOF

      - name: Update index.json with .deb SHA256 hashes
        run: |
          mkdir -p gh-pages/tools
          cp tools/index.json gh-pages/tools/index.json
          echo "" \
            | base64 -d | python3

      - name: Commit and push
        run: |
          cd gh-pages
          git config user.email "258516621+termux-app-store@users.noreply.github.com"
          git config user.name "Termux App Store"
          git add -A
          COUNT=$(ls pool/main/*.deb 2>/dev/null | wc -l || echo 0)
          MSG="pkg: update pool — ${COUNT} .deb files [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git diff --staged --quiet && echo "Nothing to commit" || (git commit -m "$MSG" && git push origin HEAD:gh-pages && echo "Pushed: $MSG")

      - name: Summary
        run: |
          COUNT=$(ls gh-pages/pool/main/*.deb 2>/dev/null | wc -l || echo 0)
          echo "## Summary" >> $GITHUB_STEP_SUMMARY
          echo "**$COUNT** .deb files in pool" >> $GITHUB_STEP_SUMMARY
